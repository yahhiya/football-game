<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Head Soccer — v5 (arcade tight)</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a3326 0%, #0a1810 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #eafaf0;
  }

  h1 {
    margin: 12px 0 4px;
    font-size: 22px;
    letter-spacing: 1px;
  }

  #hud {
    display: flex;
    gap: 32px;
    margin-bottom: 8px;
    font-size: 18px;
  }

  #instructions {
    margin-top: 8px;
    font-size: 13px;
    color: #9fcbb0;
    max-width: 700px;
    text-align: center;
  }

  /* Fixed arcade viewport — a crisp, locked window regardless of the
     browser size around it, framed like a cabinet screen bezel. */
  #arcade-frame {
    padding: 14px;
    background: linear-gradient(155deg, #2b2b2b, #0f0f0f);
    border-radius: 16px;
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.06),
      0 16px 40px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  canvas {
    display: block;
    width: 800px;
    height: 450px;
    background: #0d2a1c;
    border-radius: 6px;
    box-shadow: inset 0 0 24px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>

<h1>⚽ Head Soccer — v5</h1>
<div id="hud">
  <div>Blue (you): <span id="scoreLeft">0</span></div>
  <div>Red (AI): <span id="scoreRight">0</span></div>
</div>

<div id="arcade-frame">
  <canvas id="field" width="800" height="450"></canvas>
</div>

<div id="instructions">
  <strong>Click the field once to give it keyboard focus.</strong>
  A/D or Left/Right to move. W, Up, or Space to jump. Get close to the
  ball and press <strong>J</strong> for a low drive or <strong>K</strong>
  for a high lofted shot. Headers happen automatically — just jump into it.
</div>

<script>
/* =====================================================================
   HEAD SOCCER — V5 (arcade-tight rebuild)

   This pass focuses on FEEL and ROBUSTNESS rather than new features:
     - fixed viewport sizing
     - continuous collision detection (adaptive substepping) so the
       ball can't tunnel through anything at high speed
     - acceleration-based movement instead of instant velocity snaps
     - asymmetric jump gravity (rises fast, falls faster) for a tight,
       responsive jump arc
     - a proper boot silhouette instead of a blob + rectangle
   ===================================================================== */

const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');

const CANVAS_W = canvas.width;   // 800 — fixed arcade viewport
const CANVAS_H = canvas.height;  // 450

// ---- The pitch, in plain screen coordinates ----
const GROUND_Y = 375;
const GOAL_X_LEFT = 65;
const GOAL_X_RIGHT = 735;
const GOAL_HEIGHT = 150;
const GOAL_NET_DEPTH = 42;
const CEILING_H = GROUND_Y - 25;

let scoreLeft = 0;
let scoreRight = 0;

let kickoffTimer = 0;
const KICKOFF_FREEZE_SECONDS = 1;

function groundToScreenY(h) {
  return GROUND_Y - h;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

// Ramp `current` toward `target` by at most `maxDelta` this frame — the
// building block of acceleration-based movement. Used for both player
// input and AI steering so both feel equally tight.
function moveToward(current, target, maxDelta) {
  if (Math.abs(target - current) <= maxDelta) return target;
  return current + Math.sign(target - current) * maxDelta;
}

/* ---------------------------------------------------------------------
   1. GAME LOOP
   --------------------------------------------------------------------- */
let lastTime = performance.now();

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 1 / 30);
  lastTime = now;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

/* ---------------------------------------------------------------------
   2. INPUT
   --------------------------------------------------------------------- */
const keys = {};
const MOVE_KEYS = ['a', 'd', 'arrowleft', 'arrowright', 'w', 'arrowup', ' '];

window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  keys[key] = true;
  if (MOVE_KEYS.includes(key)) e.preventDefault();
  if (key === 'j') { e.preventDefault(); tryShoot(player, 'low'); }
  if (key === 'k') { e.preventDefault(); tryShoot(player, 'high'); }
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

canvas.tabIndex = 0;
canvas.style.outline = 'none';
canvas.addEventListener('click', () => canvas.focus());
window.addEventListener('load', () => canvas.focus());
canvas.focus();

/* ---------------------------------------------------------------------
   3. ENTITIES
   --------------------------------------------------------------------- */
const player = {
  x: GOAL_X_LEFT + 150,
  h: 0,
  vx: 0,
  vh: 0,
  grounded: true,
  knockX: 0,
  radius: 14,
  speed: 280,
  attackDir: 1,
  shotCooldown: 0,
  kickTimer: 0,
  kickType: null,
  skin: '#e3a874',
  hairColor: '#e8b23d',
  hairStyle: 'spiky',
  browColor: '#7a5a2a',
  eyeColor: '#3fae5c',
  jerseyColor: '#3fa7ff',
  bootColor: '#152233',
  bootAccent: '#3fa7ff'
};

const opponent = {
  x: GOAL_X_RIGHT - 150,
  h: 0,
  vx: 0,
  vh: 0,
  grounded: true,
  knockX: 0,
  radius: 14,
  speed: 225,
  attackDir: -1,
  shotCooldown: 0,
  kickTimer: 0,
  kickType: null,
  skin: '#d99a6c',
  hairColor: '#241a12',
  hairStyle: 'side',
  browColor: '#150f0a',
  eyeColor: '#8a3b3b',
  jerseyColor: '#ff5b5b',
  bootColor: '#1a1414',
  bootAccent: '#ff5b5b'
};

const ball = {
  x: CANVAS_W / 2,
  h: 200,
  vx: 0,
  vh: 0,
  radius: 14,
  color: '#fff8dc',
  dark: '#c9a86a'
};

// ---- Tuning constants ----

// Movement: acceleration-based so input feels immediate but not
// teleport-y. High accel = snaps to full speed almost instantly; high
// decel = stops on a dime when you let go.
const MOVE_ACCEL = 3600;
const MOVE_DECEL = 4400;

// Jump: asymmetric gravity is the classic "tight platformer jump" trick
// — rising uses a lighter pull so the jump feels responsive and floaty
// at the top, falling uses a much heavier pull so you come back down
// fast instead of hanging in the air.
const GRAVITY_PLAYER_UP = 1500;
const GRAVITY_PLAYER_DOWN = 2150;
const JUMP_VELOCITY = 650;

// Ball physics — REBALANCED for a defendable, controllable match instead
// of a pinball machine. The previous pass over-tuned for "bouncy" and
// under-tuned for "fair": restitution was too high, drag was too low,
// and there was no speed ceiling, so a couple of lucky bounces could
// snowball into a ball moving faster than anyone could react to.
const GRAVITY_BALL = 1200;
const BALL_GROUND_RESTITUTION = 0.68;
const BALL_WALL_RESTITUTION = 0.6;
const BALL_COLLISION_RESTITUTION = 0.7;
const BALL_AIR_DRAG_PER_SECOND = 0.22;   // real air resistance now — a kicked ball visibly loses pace
const BALL_GROUND_FRICTION_PER_SECOND = 0.62;
const BALL_SETTLE_THRESHOLD = 18;
const BALL_MAX_SPEED = 780;              // hard cap — nothing can push the ball faster than this, ever

const HEAD_COLLISION_RADIUS = 27;
const BOOT_COLLISION_RADIUS = 16;
const HEAD_OFFSET = 70;
const BOOT_OFFSET = 7;
// BUG FIX: the head circle (bottom edge at h=43) and boot circle (top
// edge at h=23) left a 20px gap with NO collision coverage between
// them — the ball could slip straight through the middle of a player.
// BODY_RADIUS defines a capsule (a "torso") spanning that exact gap, so
// the whole silhouette from boot to head is one unbroken hitbox.
const BODY_RADIUS = 19;

const KNOCKBACK_FRICTION_PER_SECOND = 0.9;

// Shooting — also toned down so a single shot can't cross the whole
// pitch before the defender has any chance to react.
const SHOOT_RANGE = 80;
const SHOT_COOLDOWN_SECONDS = 0.55;
const KICK_ANIM_DURATION = 0.26;
const LOW_SHOT_SPEED = 560;
const LOW_SHOT_LIFT = 70;
const HIGH_SHOT_SPEED = 360;
const HIGH_SHOT_LIFT = 660;

/* ---------------------------------------------------------------------
   4. UPDATE
   --------------------------------------------------------------------- */
function update(dt) {
  if (kickoffTimer > 0) {
    kickoffTimer = Math.max(0, kickoffTimer - dt);
    simulateBallSubsteps(dt); // let it visibly drop/settle during the pause
    return;
  }

  movePlayer(dt);
  updateOpponentAI(dt);

  simulateBallSubsteps(dt);

  handleBodyCollision(player, opponent);
  player.x = clamp(player.x, GOAL_X_LEFT + player.radius, GOAL_X_RIGHT - player.radius);
  opponent.x = clamp(opponent.x, GOAL_X_LEFT + opponent.radius, GOAL_X_RIGHT - opponent.radius);
}

/* ---------------------------------------------------------------------
   CONTINUOUS COLLISION DETECTION (adaptive substepping)

   THE PROBLEM: a circle-vs-circle overlap check only catches a
   collision if the two shapes actually overlap at the moment we check.
   If the ball is moving fast enough to cross an entire player's
   diameter within a single frame, it can be on one side before the
   frame and the other side after — with no frame in between where they
   ever overlapped. The check technically never fails; it just never
   runs at the right moment. That's tunneling, and it's why a fast shot
   could clip straight through a head.

   THE FIX: instead of moving the ball the FULL distance in one big
   step and checking once, split this frame's motion into several
   smaller sub-steps — enough that the ball can't move more than about
   one collider-radius per step — and run the full move+collide check
   after EACH sub-step. The ball is still checked at every point along
   its path in practice, just broken into pieces small enough that nothing
   can hide between checks. Gravity, drag, and everything else scale
   down proportionally with the smaller time slice, so the total motion
   over the whole frame comes out the same as before — it's just
   sampled finely enough to never miss a collision.
   --------------------------------------------------------------------- */
function simulateBallSubsteps(dt) {
  const speed = Math.hypot(ball.vx, ball.vh);
  const maxStepDistance = Math.max(4, BOOT_COLLISION_RADIUS * 0.8);
  // Capped at 12 sub-steps/frame purely for performance headroom — that's
  // still cheap (12 simple collision checks is nothing for a canvas this
  // size). The cap means the no-tunnel guarantee technically only holds
  // up to a few thousand px/s; this game's fastest shot tops out around
  // 700px/s, so there's roughly an order of magnitude of safety margin.
  const steps = clamp(Math.ceil((speed * dt) / maxStepDistance), 1, 12);
  const subDt = dt / steps;

  for (let i = 0; i < steps; i++) {
    moveBall(subDt);
    handleEntityBallCollision(player);
    resolveBallWalls();
    handleEntityBallCollision(opponent);
    resolveBallWalls();
    if (handleGoals()) return; // a goal reset everything — stop this frame's remaining sub-steps
  }
}

function movePlayer(dt) {
  updateShotTimers(player, dt);

  let dir = 0;
  if (keys['a'] || keys['arrowleft']) dir -= 1;
  if (keys['d'] || keys['arrowright']) dir += 1;

  const targetVx = dir * player.speed;
  const accel = dir !== 0 ? MOVE_ACCEL : MOVE_DECEL;
  player.vx = moveToward(player.vx, targetVx, accel * dt);
  player.x += player.vx * dt;

  if ((keys['w'] || keys['arrowup'] || keys[' ']) && player.grounded) {
    player.vh = JUMP_VELOCITY;
    player.grounded = false;
  }

  applyGravity(player, dt);
  applyKnockback(player, dt);

  player.x = clamp(player.x, GOAL_X_LEFT + player.radius, GOAL_X_RIGHT - player.radius);
}

function updateOpponentAI(dt) {
  updateShotTimers(opponent, dt);

  const toBallX = ball.x - opponent.x;
  let desiredDir = 0;
  if (Math.abs(toBallX) > 4) desiredDir = Math.sign(toBallX);

  const awayX = opponent.x - player.x;
  const distPlayer = Math.abs(awayX);
  const SEPARATION_RANGE = opponent.radius + player.radius + 34;
  let sepDir = 0;
  if (distPlayer > 0 && distPlayer < SEPARATION_RANGE) {
    sepDir = Math.sign(awayX) * (1 - distPlayer / SEPARATION_RANGE);
  }

  const steer = clamp(desiredDir + sepDir * 1.3, -1, 1);
  const targetVx = steer * opponent.speed;
  const accel = Math.abs(steer) > 0.05 ? MOVE_ACCEL : MOVE_DECEL;
  opponent.vx = moveToward(opponent.vx, targetVx, accel * dt);
  opponent.x += opponent.vx * dt;

  const ballIsClose = Math.abs(ball.x - opponent.x) < 70;
  const ballIsUp = ball.h > 50;
  if (ballIsClose && ballIsUp && opponent.grounded) {
    opponent.vh = JUMP_VELOCITY;
    opponent.grounded = false;
  }

  const shotType = ball.h < 55 ? 'low' : (Math.random() < 0.55 ? 'low' : 'high');
  tryShoot(opponent, shotType);

  applyGravity(opponent, dt);
  applyKnockback(opponent, dt);

  opponent.x = clamp(opponent.x, GOAL_X_LEFT + opponent.radius, GOAL_X_RIGHT - opponent.radius);
}

function applyGravity(entity, dt) {
  const g = entity.vh > 0 ? GRAVITY_PLAYER_UP : GRAVITY_PLAYER_DOWN;
  entity.vh -= g * dt;
  entity.h += entity.vh * dt;

  if (entity.h <= 0) {
    entity.h = 0;
    entity.vh = 0;
    entity.grounded = true;
  } else {
    entity.grounded = false;
  }
}

function applyKnockback(entity, dt) {
  const decay = Math.pow(1 - KNOCKBACK_FRICTION_PER_SECOND, dt);
  entity.knockX *= decay;
  if (Math.abs(entity.knockX) < 2) entity.knockX = 0;
  entity.x += entity.knockX * dt;
}

function moveBall(dt) {
  ball.vh -= GRAVITY_BALL * dt;

  if (ball.h > 0) {
    ball.vx *= Math.pow(1 - BALL_AIR_DRAG_PER_SECOND, dt);
  } else {
    ball.vx *= Math.pow(1 - BALL_GROUND_FRICTION_PER_SECOND, dt);
    if (Math.abs(ball.vx) < 2) ball.vx = 0;
  }

  ball.x += ball.vx * dt;
  ball.h += ball.vh * dt;

  resolveBallWalls();
}

function resolveBallWalls() {
  if (ball.h < 0) {
    ball.h = 0;
    if (ball.vh < 0) ball.vh = -ball.vh * BALL_GROUND_RESTITUTION;
    if (Math.abs(ball.vh) < BALL_SETTLE_THRESHOLD) ball.vh = 0;
  }

  if (ball.h > CEILING_H) {
    ball.h = CEILING_H;
    if (ball.vh > 0) ball.vh = -Math.abs(ball.vh) * 0.5;
  }

  const inGoalOpening = ball.h < GOAL_HEIGHT;
  if (!inGoalOpening) {
    if (ball.x - ball.radius < GOAL_X_LEFT) {
      ball.x = GOAL_X_LEFT + ball.radius;
      ball.vx = Math.abs(ball.vx) * BALL_WALL_RESTITUTION;
    }
    if (ball.x + ball.radius > GOAL_X_RIGHT) {
      ball.x = GOAL_X_RIGHT - ball.radius;
      ball.vx = -Math.abs(ball.vx) * BALL_WALL_RESTITUTION;
    }
  }

  // Hard speed cap. This runs after every single thing that can change
  // the ball's velocity (movement, wall bounces, player collisions,
  // shots), so there's no path — including several bounces stacking
  // restitution on top of each other — that can sneak the ball above
  // this speed. That's what keeps the match from snowballing into chaos.
  const speed = Math.hypot(ball.vx, ball.vh);
  if (speed > BALL_MAX_SPEED) {
    const scale = BALL_MAX_SPEED / speed;
    ball.vx *= scale;
    ball.vh *= scale;
  }
}

/* ---------------------------------------------------------------------
   ENTITY HITBOX — head circle + boot circle + a CAPSULE spanning the
   torso between them (see BODY_RADIUS above). Together these form one
   continuous vertical hitbox with no gap the ball can slip through.

   Each candidate surface is tested and scored by how deep the ball has
   penetrated into it; only the single deepest contact is resolved per
   check. That avoids two overlapping surfaces (say, the capsule and
   the head) both firing and fighting each other in the same frame,
   while still guaranteeing the ball gets pushed fully clear of
   whichever surface it actually hit.
   --------------------------------------------------------------------- */
function pointOverlap(cx, cH, cR, kickPower) {
  const dx = ball.x - cx;
  const dh = ball.h - cH;
  const dist = Math.hypot(dx, dh);
  const minDist = cR + ball.radius;
  return {
    dist, penetration: minDist - dist,
    nx: dist > 0 ? dx / dist : 0,
    nh: dist > 0 ? dh / dist : 1,
    kickPower
  };
}

// A capsule is just "the closest point on a line segment" instead of a
// single fixed point — same math as pointOverlap, but the point we
// measure from slides along the segment first.
function capsuleOverlap(cx, bottomH, topH, cR, kickPower) {
  const clampedH = clamp(ball.h, bottomH, topH);
  return pointOverlap(cx, clampedH, cR, kickPower);
}

function resolveDeepestContact(entity) {
  const candidates = [
    pointOverlap(entity.x, entity.h + HEAD_OFFSET, HEAD_COLLISION_RADIUS, 1.1),
    pointOverlap(entity.x, entity.h + BOOT_OFFSET, BOOT_COLLISION_RADIUS, 1.3),
    capsuleOverlap(entity.x, entity.h + BOOT_OFFSET, entity.h + HEAD_OFFSET, BODY_RADIUS, 1.15)
  ];

  let best = null;
  for (const c of candidates) {
    if (c.penetration > 0 && c.dist > 0 && (!best || c.penetration > best.penetration)) {
      best = c;
    }
  }
  if (!best) return false;

  // Push the ball fully clear along the contact normal — never leaves
  // it embedded, regardless of which surface it hit.
  ball.x += best.nx * best.penetration;
  ball.h += best.nh * best.penetration;

  const dot = ball.vx * best.nx + ball.vh * best.nh;
  const reflectedVx = ball.vx - 2 * dot * best.nx;
  const reflectedVh = ball.vh - 2 * dot * best.nh;
  const entitySpeed = Math.hypot(entity.vx, entity.vh);

  ball.vx = reflectedVx * BALL_COLLISION_RESTITUTION + best.nx * entitySpeed * best.kickPower + entity.vx * 0.35;
  ball.vh = reflectedVh * BALL_COLLISION_RESTITUTION + best.nh * entitySpeed * best.kickPower + entity.vh * 0.35;
  return true;
}

function handleEntityBallCollision(entity) {
  // Resolve up to twice: fixing the deepest contact can occasionally
  // leave a smaller residual overlap with a different part of the
  // hitbox (e.g. pushing out of the head grazes the capsule) — a
  // second pass cleans that up so the ball never ends this check still
  // partially inside the player.
  let hitAny = false;
  for (let pass = 0; pass < 2; pass++) {
    if (resolveDeepestContact(entity)) hitAny = true;
    else break;
  }
  return hitAny;
}

function tryShoot(entity, type) {
  if (entity.shotCooldown > 0) return false;

  const dist = Math.hypot(ball.x - entity.x, ball.h - (entity.h + BOOT_OFFSET));
  if (dist > SHOOT_RANGE) return false;

  const speed = type === 'low' ? LOW_SHOT_SPEED : HIGH_SHOT_SPEED;
  const lift = type === 'low' ? LOW_SHOT_LIFT : HIGH_SHOT_LIFT;

  ball.vx = entity.attackDir * speed + entity.vx * 0.25;
  ball.vh = lift + entity.vh * 0.25;

  entity.shotCooldown = SHOT_COOLDOWN_SECONDS;
  entity.kickTimer = KICK_ANIM_DURATION;
  entity.kickType = type;
  return true;
}

function updateShotTimers(entity, dt) {
  entity.shotCooldown = Math.max(0, entity.shotCooldown - dt);
  entity.kickTimer = Math.max(0, entity.kickTimer - dt);
}

function handleBodyCollision(a, b) {
  const dx = b.x - a.x;
  const distX = Math.abs(dx);
  const minDist = a.radius * 2 + b.radius * 2;
  const heightDiff = Math.abs(a.h - b.h);

  if (distX < minDist && distX > 0 && heightDiff < HEAD_COLLISION_RADIUS * 1.5) {
    const overlap = (minDist - distX) / 2;
    const dir = Math.sign(dx);
    a.x -= dir * overlap;
    b.x += dir * overlap;

    const KNOCK_STRENGTH = 0.5;
    const aSpeed = Math.abs(a.vx);
    const bSpeed = Math.abs(b.vx);
    b.knockX += dir * aSpeed * KNOCK_STRENGTH;
    a.knockX -= dir * bSpeed * KNOCK_STRENGTH;
  }
}

function handleGoals() {
  if (ball.x + ball.radius < GOAL_X_LEFT) {
    scoreRight++;
    document.getElementById('scoreRight').textContent = scoreRight;
    resetAfterGoal();
    return true;
  }
  if (ball.x - ball.radius > GOAL_X_RIGHT) {
    scoreLeft++;
    document.getElementById('scoreLeft').textContent = scoreLeft;
    resetAfterGoal();
    return true;
  }
  return false;
}

function resetAfterGoal() {
  ball.x = CANVAS_W / 2;
  ball.h = 200;
  ball.vx = 0;
  ball.vh = 0;

  player.x = GOAL_X_LEFT + 150;
  player.h = 0;
  player.vx = 0;
  player.vh = 0;
  player.knockX = 0;
  player.grounded = true;
  player.shotCooldown = 0;
  player.kickTimer = 0;

  opponent.x = GOAL_X_RIGHT - 150;
  opponent.h = 0;
  opponent.vx = 0;
  opponent.vh = 0;
  opponent.knockX = 0;
  opponent.grounded = true;
  opponent.shotCooldown = 0;
  opponent.kickTimer = 0;

  kickoffTimer = KICKOFF_FREEZE_SECONDS;
}

/* ---------------------------------------------------------------------
   5. RENDER
   --------------------------------------------------------------------- */
function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawSky();
  drawPitch();
  drawGoal(true);
  drawGoal(false);
  drawEntitiesSorted();

  if (kickoffTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#eafaf0';
    ctx.font = 'bold 32px Segoe UI, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Kickoff!', CANVAS_W / 2, CANVAS_H / 2);
    ctx.textAlign = 'start';
  }
}

function drawSky() {
  const gradient = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  gradient.addColorStop(0, '#173049');
  gradient.addColorStop(1, '#2d5a63');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);
}

function drawPitch() {
  ctx.fillStyle = '#2e7d4f';
  ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H - GROUND_Y);

  const stripeW = 40;
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  for (let x = 0; x < CANVAS_W; x += stripeW * 2) {
    ctx.fillRect(x, GROUND_Y, stripeW, CANVAS_H - GROUND_Y);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(CANVAS_W, GROUND_Y);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(CANVAS_W / 2, GROUND_Y, 40, 7, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(CANVAS_W / 2, GROUND_Y, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();
}

function drawGoal(isLeft) {
  const frontX = isLeft ? GOAL_X_LEFT : GOAL_X_RIGHT;
  const backX = isLeft ? GOAL_X_LEFT - GOAL_NET_DEPTH : GOAL_X_RIGHT + GOAL_NET_DEPTH;
  const leftX = Math.min(frontX, backX);
  const rightX = Math.max(frontX, backX);
  const topY = GROUND_Y - GOAL_HEIGHT;

  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  const spacing = 10;
  for (let x = leftX; x <= rightX; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x, topY);
    ctx.lineTo(x, GROUND_Y);
    ctx.stroke();
  }
  for (let y = topY; y <= GROUND_Y; y += spacing) {
    ctx.beginPath();
    ctx.moveTo(leftX, y);
    ctx.lineTo(rightX, y);
    ctx.stroke();
  }

  ctx.strokeStyle = '#eafaf0';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';

  ctx.beginPath();
  ctx.moveTo(frontX, GROUND_Y);
  ctx.lineTo(frontX, topY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(backX, GROUND_Y);
  ctx.lineTo(backX, topY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(leftX, topY);
  ctx.lineTo(rightX, topY);
  ctx.stroke();

  ctx.fillStyle = '#eafaf0';
  ctx.beginPath();
  ctx.ellipse(frontX, GROUND_Y, 7, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(backX, GROUND_Y, 7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.lineCap = 'butt';
}

function drawEntitiesSorted() {
  const items = [
    { e: player, kind: 'player' },
    { e: opponent, kind: 'player' },
    { e: ball, kind: 'ball' }
  ].sort((a, b) => a.e.h - b.e.h);

  items.forEach(item => {
    if (item.kind === 'ball') drawBall(item.e);
    else drawCharacter(item.e);
  });
}

function drawGroundShadow(x, h, baseRadius) {
  const t = clamp(h / 160, 0, 1);
  const rx = baseRadius * (1 - 0.45 * t);
  const ry = baseRadius * 0.32 * (1 - 0.45 * t);
  const alpha = 0.3 * (1 - 0.5 * t);

  ctx.beginPath();
  ctx.ellipse(x, GROUND_Y, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,0,0,${alpha})`;
  ctx.fill();
}

function drawBall(entity) {
  drawGroundShadow(entity.x, entity.h, entity.radius * 1.3);

  const screenY = groundToScreenY(entity.h);
  ctx.beginPath();
  ctx.arc(entity.x, screenY, entity.radius, 0, Math.PI * 2);
  ctx.fillStyle = entity.color;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = entity.dark;
  ctx.stroke();

  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.arc(entity.x, screenY, entity.radius * 0.55, 0.3, Math.PI - 0.3);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(entity.x, screenY, entity.radius * 0.55, Math.PI + 0.3, Math.PI * 2 - 0.3);
  ctx.stroke();
}

function drawCharacter(entity) {
  drawGroundShadow(entity.x, entity.h, entity.radius * 1.3);

  const baseY = groundToScreenY(entity.h);
  const bootY = baseY - BOOT_OFFSET;
  const headY = baseY - HEAD_OFFSET;

  drawBoot(entity.x, bootY, entity);
  drawTorso(entity.x, bootY, headY, entity);
  drawHead(entity.x, headY, entity);
}

// The visible "torso" strip fills the same space as the BODY_RADIUS
// capsule hitbox — so what you see lined up with the physics is
// exactly what actually blocks the ball, no gap either way.
function drawTorso(cx, bootScreenY, headScreenY, entity) {
  const width = BODY_RADIUS * 1.7;
  const top = headScreenY + entity.radius * 0.9;   // tucks up under the chin
  const bottom = bootScreenY - entity.radius * 0.15; // tucks down into the ankle cuff

  roundRectPath(cx - width / 2, top, width, bottom - top, width * 0.3);
  ctx.fillStyle = entity.jerseyColor;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.stroke();
}

function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* -----------------------------------------------------------------------
   BOOT — a proper angled silhouette (heel, arched sole, pointed toe,
   ankle cuff, studs) instead of an ellipse-plus-rectangle blob. Drawn
   "pointing" toward +x in local space; ctx.scale(attackDir, 1) below
   mirrors it to face whichever goal that entity attacks, so the kick
   swing rotation itself never needs to know which team it's animating.
   ----------------------------------------------------------------------- */
function drawBoot(cx, cy, entity) {
  const w = entity.radius * 3.1;
  const h = entity.radius * 1.9;

  let swingAngle = 0;
  if (entity.kickTimer > 0 && entity.kickType) {
    const progress = 1 - entity.kickTimer / KICK_ANIM_DURATION;
    const swing = Math.sin(progress * Math.PI);
    const maxAngle = entity.kickType === 'low' ? 0.8 : 1.15;
    swingAngle = -maxAngle * swing;
  }

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(entity.attackDir, 1); // face the attack direction
  ctx.rotate(swingAngle);

  // Boot silhouette: heel (back) -> ankle cuff -> tongue -> toe -> sole -> back to heel
  const heelX = -w * 0.42, toeX = w * 0.52;
  const soleY = h * 0.3, cuffTopY = -h * 0.62;

  ctx.beginPath();
  ctx.moveTo(heelX + w * 0.08, cuffTopY);                                  // ankle back, top
  ctx.quadraticCurveTo(-w * 0.02, cuffTopY - h * 0.08, w * 0.04, cuffTopY + h * 0.05); // cuff top curve to tongue
  ctx.quadraticCurveTo(w * 0.34, -h * 0.28, toeX, h * 0.02);                // instep down to toe tip
  ctx.quadraticCurveTo(w * 0.5, h * 0.22, toeX - w * 0.14, soleY);          // toe curve to ball-of-foot
  ctx.lineTo(heelX + w * 0.06, soleY);                                     // sole, flat-ish
  ctx.quadraticCurveTo(heelX - w * 0.04, soleY - h * 0.05, heelX, h * 0.02); // heel bottom curve
  ctx.quadraticCurveTo(heelX - w * 0.03, cuffTopY + h * 0.25, heelX + w * 0.08, cuffTopY); // heel back up to cuff
  ctx.closePath();

  ctx.fillStyle = entity.bootColor;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.stroke();

  // Studs along the sole
  ctx.fillStyle = '#0a0a0a';
  const studCount = 4;
  for (let i = 0; i < studCount; i++) {
    const t = i / (studCount - 1);
    const sx = heelX + w * 0.1 + t * (toeX - w * 0.2 - heelX);
    ctx.beginPath();
    ctx.ellipse(sx, soleY + h * 0.06, w * 0.035, h * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Team accent stripe along the side
  ctx.strokeStyle = entity.bootAccent;
  ctx.lineWidth = Math.max(2, h * 0.1);
  ctx.beginPath();
  ctx.moveTo(heelX + w * 0.12, -h * 0.02);
  ctx.lineTo(toeX - w * 0.22, -h * 0.05);
  ctx.stroke();

  // Laces on the tongue
  ctx.strokeStyle = '#f4f4f4';
  ctx.lineWidth = 1.4;
  for (let i = 0; i < 3; i++) {
    const lx = w * 0.06 + i * w * 0.09;
    ctx.beginPath();
    ctx.moveTo(lx, cuffTopY + h * 0.18);
    ctx.lineTo(lx + w * 0.07, cuffTopY + h * 0.36);
    ctx.stroke();
  }

  ctx.restore();
}

function drawHead(cx, cy, entity) {
  const R = entity.radius * 2.0;

  ctx.save();
  ctx.translate(cx, cy);

  roundRectPath(-R * 0.55, R * 0.55, R * 1.1, R * 0.55, R * 0.15);
  ctx.fillStyle = entity.jerseyColor;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.stroke();

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-R * 0.2, R * 0.55);
  ctx.lineTo(0, R * 0.82);
  ctx.lineTo(R * 0.2, R * 0.55);
  ctx.stroke();

  ctx.fillStyle = entity.skin;
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side * R * 0.92, R * 0.05, R * 0.18, R * 0.24, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.stroke();
  });

  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.fillStyle = entity.skin;
  ctx.fill();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.stroke();

  drawHair(entity, R);

  ctx.strokeStyle = entity.browColor;
  ctx.lineWidth = R * 0.14;
  ctx.lineCap = 'round';
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.moveTo(side * R * 0.14, -R * 0.1);
    ctx.lineTo(side * R * 0.5, -R * 0.3);
    ctx.stroke();
  });

  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side * R * 0.35, R * 0.03, R * 0.16, R * 0.12, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(side * R * 0.37, R * 0.04, R * 0.07, 0, Math.PI * 2);
    ctx.fillStyle = entity.eyeColor;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(side * R * 0.37, R * 0.04, R * 0.03, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
  });

  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, R * 0.1);
  ctx.lineTo(-R * 0.05, R * 0.3);
  ctx.lineTo(R * 0.05, R * 0.3);
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(0, R * 0.5, R * 0.26, R * 0.13, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#5c2020';
  ctx.fill();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.stroke();

  ctx.fillStyle = '#fff';
  roundRectPath(-R * 0.2, R * 0.4, R * 0.4, R * 0.09, R * 0.03);
  ctx.fill();

  ctx.restore();
}

function drawHair(entity, R) {
  ctx.fillStyle = entity.hairColor;
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';

  if (entity.hairStyle === 'spiky') {
    ctx.beginPath();
    ctx.moveTo(-R * 0.9, -R * 0.3);
    const spikes = 6;
    for (let i = 0; i <= spikes; i++) {
      const t = i / spikes;
      const x = -R * 0.9 + t * R * 1.8;
      const y = -R * 0.75 - (i % 2 === 0 ? R * 0.25 : R * 0.05);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(R * 0.9, -R * 0.05);
    ctx.quadraticCurveTo(0, -R * 0.5, -R * 0.9, -R * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(-R * 0.85, 0);
    ctx.quadraticCurveTo(-R * 0.9, -R * 0.85, -R * 0.1, -R * 0.85);
    ctx.quadraticCurveTo(R * 0.75, -R * 0.85, R * 0.85, -R * 0.2);
    ctx.quadraticCurveTo(R * 0.5, -R * 0.45, R * 0.1, -R * 0.55);
    ctx.quadraticCurveTo(-R * 0.3, -R * 0.6, -R * 0.6, -R * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

// Kick everything off
requestAnimationFrame(gameLoop);
</script>
