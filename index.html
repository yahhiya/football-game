<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Physics Soccer — v3 (2.5D)</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #10231a;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #eafaf0;
  }

  h1 {
    margin: 12px 0 4px;
    font-size: 22px;
    letter-spacing: 1px;
  }

  #hud {
    display: flex;
    gap: 32px;
    margin-bottom: 8px;
    font-size: 18px;
  }

  #instructions {
    margin-top: 8px;
    font-size: 13px;
    color: #9fcbb0;
    max-width: 700px;
    text-align: center;
  }

  canvas {
    background: #163a25;
    border: 6px solid #eafaf0;
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<h1>⚽ Physics Soccer — v3 (2.5D)</h1>
<div id="hud">
  <div>Blue (you): <span id="scoreLeft">0</span></div>
  <div>Red (AI): <span id="scoreRight">0</span></div>
</div>

<canvas id="field" width="1080" height="460"></canvas>

<div id="instructions">
  <strong>Click the field once to give it keyboard focus</strong>, then use
  WASD or Arrow Keys to move. Run into the ball to kick it. The red AI
  chases the ball too — beat it there and out-muscle it to score.
</div>

<script>
/* =====================================================================
   PHYSICS SOCCER — V3 (2.5D / oblique projection camera)

   THE BIG IDEA OF THIS VERSION:
   The physics simulation (positions, velocities, collisions) still runs
   entirely in flat, simple 2D "world" coordinates — nothing about
   movePlayer(), moveBall(), or the collision functions changes at all
   from v2. All we're adding is a PROJECTION step: a function that takes
   a world coordinate (and an optional height) and decides where that
   point should actually be drawn on screen.

   This separation — "simulation space" vs "render space" — is one of
   the most useful ideas in game dev. It's *why* we can bolt a totally
   different camera onto an already-working game without touching the
   game logic.
   ===================================================================== */

const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');

// ---- WORLD SPACE (unchanged from v2 — this is what the physics uses) ----
const FIELD_W = 800;
const FIELD_H = 500;

const GOAL_HEIGHT = 140; // gap in the goal line, in world units
const GOAL_TOP = (FIELD_H - GOAL_HEIGHT) / 2;
const GOAL_BOTTOM = GOAL_TOP + GOAL_HEIGHT;

let scoreLeft = 0;
let scoreRight = 0;

/* ---------------------------------------------------------------------
   THE PROJECTION (world -> screen)

   We fake a tilted camera with a simple "oblique projection":
     - TILT_Y   squashes the pitch's depth axis (world Y), which is what
                makes a flat rectangle read as "receding into the
                distance" instead of a plain bird's-eye view.
     - SHEAR_X  shifts points sideways based on how far along the depth
                axis they are, turning the pitch into a slanted
                parallelogram instead of a flat rectangle — this is the
                actual "isometric-ish" part.
     - height (wz) simply moves a point straight UP on screen, with no
                shear and no squash. That's the key trick: because a
                post's base and its top share the same world x/y, they
                only differ in wz, which means they land at the exact
                same screenX — so every vertical in the world renders as
                a perfectly vertical line on screen. That's what makes
                the goalposts (and the players) "stand up straight".
   --------------------------------------------------------------------- */
const TILT_Y = 0.55;
const SHEAR_X = 0.35;
const MARGIN_LEFT = 140;
const MARGIN_TOP = 140;

function project(wx, wy, wz = 0) {
  const depthShift = (wy - FIELD_H / 2) * SHEAR_X;
  return {
    x: MARGIN_LEFT + wx + depthShift,
    y: MARGIN_TOP + wy * TILT_Y - wz
  };
}

/* ---------------------------------------------------------------------
   1. THE GAME LOOP (identical to v2)
   --------------------------------------------------------------------- */
let lastTime = performance.now();

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 1 / 30);
  lastTime = now;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

/* ---------------------------------------------------------------------
   2. INPUT HANDLING (identical to v2)
   --------------------------------------------------------------------- */
const keys = {};
const MOVE_KEYS = ['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'];

window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  keys[key] = true;
  if (MOVE_KEYS.includes(key)) e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

canvas.tabIndex = 0;
canvas.style.outline = 'none';
canvas.addEventListener('click', () => canvas.focus());
window.addEventListener('load', () => canvas.focus());
canvas.focus();

/* ---------------------------------------------------------------------
   3. ENTITIES — still plain world-space objects, exactly like v2.
   Nothing here knows or cares that the camera is tilted.
   --------------------------------------------------------------------- */
const player = {
  x: FIELD_W / 2 - 150,
  y: FIELD_H / 2,
  vx: 0,
  vy: 0,
  radius: 16,
  speed: 220,
  color: '#3fa7ff',
  dark: '#1a4a7a'
};

const opponent = {
  x: FIELD_W / 2 + 150,
  y: FIELD_H / 2,
  vx: 0,
  vy: 0,
  radius: 16,
  speed: 190,
  color: '#ff5b5b',
  dark: '#7a1a1a'
};

const ball = {
  x: FIELD_W / 2,
  y: FIELD_H / 2,
  vx: 0,
  vy: 0,
  radius: 10,
  color: '#fff8dc',
  dark: '#c9a86a'
};

const FRICTION_PER_SECOND = 0.35;

/* ---------------------------------------------------------------------
   4. UPDATE — 100% identical logic to v2. This is the payoff of having
   kept physics and rendering separate: swapping the whole camera model
   required zero changes below this line.
   --------------------------------------------------------------------- */
function update(dt) {
  movePlayer(dt);
  updateOpponentAI(dt);
  moveBall(dt);
  handleEntityBallCollision(player);
  handleEntityBallCollision(opponent);
  handleEntityCollision(player, opponent);
  handleGoals();
}

function movePlayer(dt) {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    dx /= len;
    dy /= len;
  }

  player.vx = dx * player.speed;
  player.vy = dy * player.speed;

  player.x += player.vx * dt;
  player.y += player.vy * dt;

  player.x = clamp(player.x, player.radius, FIELD_W - player.radius);
  player.y = clamp(player.y, player.radius, FIELD_H - player.radius);
}

function updateOpponentAI(dt) {
  const dx = ball.x - opponent.x;
  const dy = ball.y - opponent.y;
  const dist = Math.hypot(dx, dy);

  if (dist > 1) {
    const nx = dx / dist;
    const ny = dy / dist;
    opponent.vx = nx * opponent.speed;
    opponent.vy = ny * opponent.speed;
  } else {
    opponent.vx = 0;
    opponent.vy = 0;
  }

  opponent.x += opponent.vx * dt;
  opponent.y += opponent.vy * dt;

  opponent.x = clamp(opponent.x, opponent.radius, FIELD_W - opponent.radius);
  opponent.y = clamp(opponent.y, opponent.radius, FIELD_H - opponent.radius);
}

function moveBall(dt) {
  const frictionFactor = Math.pow(1 - FRICTION_PER_SECOND, dt);
  ball.vx *= frictionFactor;
  ball.vy *= frictionFactor;

  if (Math.hypot(ball.vx, ball.vy) < 2) {
    ball.vx = 0;
    ball.vy = 0;
  }

  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  if (ball.y - ball.radius < 0) {
    ball.y = ball.radius;
    ball.vy *= -0.7;
  }
  if (ball.y + ball.radius > FIELD_H) {
    ball.y = FIELD_H - ball.radius;
    ball.vy *= -0.7;
  }

  const inGoalGapY = ball.y > GOAL_TOP && ball.y < GOAL_BOTTOM;

  if (!inGoalGapY) {
    if (ball.x - ball.radius < 0) {
      ball.x = ball.radius;
      ball.vx *= -0.7;
    }
    if (ball.x + ball.radius > FIELD_W) {
      ball.x = FIELD_W - ball.radius;
      ball.vx *= -0.7;
    }
  }
}

function handleEntityBallCollision(entity) {
  const dx = ball.x - entity.x;
  const dy = ball.y - entity.y;
  const dist = Math.hypot(dx, dy);
  const minDist = entity.radius + ball.radius;

  if (dist < minDist && dist > 0) {
    const overlap = minDist - dist;
    const nx = dx / dist;
    const ny = dy / dist;
    ball.x += nx * overlap;
    ball.y += ny * overlap;

    const kickPower = 1.4;
    ball.vx = nx * Math.hypot(entity.vx, entity.vy) * kickPower + entity.vx * 0.3;
    ball.vy = ny * Math.hypot(entity.vx, entity.vy) * kickPower + entity.vy * 0.3;
  }
}

function handleEntityCollision(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.hypot(dx, dy);
  const minDist = a.radius + b.radius;

  if (dist < minDist && dist > 0) {
    const overlap = (minDist - dist) / 2;
    const nx = dx / dist;
    const ny = dy / dist;
    a.x -= nx * overlap;
    a.y -= ny * overlap;
    b.x += nx * overlap;
    b.y += ny * overlap;
  }
}

function handleGoals() {
  if (ball.x + ball.radius < 0) {
    scoreRight++;
    document.getElementById('scoreRight').textContent = scoreRight;
    resetAfterGoal();
  }
  if (ball.x - ball.radius > FIELD_W) {
    scoreLeft++;
    document.getElementById('scoreLeft').textContent = scoreLeft;
    resetAfterGoal();
  }
}

function resetAfterGoal() {
  ball.x = FIELD_W / 2;
  ball.y = FIELD_H / 2;
  ball.vx = 0;
  ball.vy = 0;
  player.x = FIELD_W / 2 - 150;
  player.y = FIELD_H / 2;
  opponent.x = FIELD_W / 2 + 150;
  opponent.y = FIELD_H / 2;
  opponent.vx = 0;
  opponent.vy = 0;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

/* ---------------------------------------------------------------------
   5. RENDER — this is the part that's genuinely new in v3. Everything
   below draws through project(), never touches raw world coordinates
   directly on the canvas.
   --------------------------------------------------------------------- */
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawPitch();
  drawGoal(true);
  drawGoal(false);
  drawEntitiesSorted();
}

// ---- Pitch (ground plane) ----
function drawPitch() {
  const corners = [
    project(0, 0), project(FIELD_W, 0),
    project(FIELD_W, FIELD_H), project(0, FIELD_H)
  ];

  ctx.fillStyle = '#2e7d4f';
  ctx.beginPath();
  ctx.moveTo(corners[0].x, corners[0].y);
  for (let i = 1; i < corners.length; i++) ctx.lineTo(corners[i].x, corners[i].y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Center line: a straight line in world space, still straight (but
  // now diagonal) after projection since project() is a linear map.
  const midTop = project(FIELD_W / 2, 0);
  const midBottom = project(FIELD_W / 2, FIELD_H);
  ctx.beginPath();
  ctx.moveTo(midTop.x, midTop.y);
  ctx.lineTo(midBottom.x, midBottom.y);
  ctx.stroke();

  // Center circle: a circle in world space becomes an ellipse-ish shape
  // after our shear+squash, so we sample points around it rather than
  // using ctx.arc (which only draws true circles).
  drawWorldCircleOutline(FIELD_W / 2, FIELD_H / 2, 50);
}

function drawWorldCircleOutline(wx, wy, radius, steps = 40) {
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    const p = project(wx + Math.cos(a) * radius, wy + Math.sin(a) * radius, 0);
    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
}

// ---- Goals: real upright 3D-ish boxes made of projected quads ----
const POST_HEIGHT = 90;     // visual height of the goal frame, in world units
const GOAL_DEPTH = 45;      // how far the net extends behind the goal line

function drawGoal(isLeft) {
  const frontX = isLeft ? 0 : FIELD_W;
  const backX = isLeft ? -GOAL_DEPTH : FIELD_W + GOAL_DEPTH;

  // The 8 corners of the goal "box": front/back x top/bottom(depth) x ground/height
  const fTopN = project(frontX, GOAL_TOP, POST_HEIGHT);
  const fTopF = project(frontX, GOAL_BOTTOM, POST_HEIGHT);
  const fBotN = project(frontX, GOAL_TOP, 0);
  const fBotF = project(frontX, GOAL_BOTTOM, 0);

  const bTopN = project(backX, GOAL_TOP, POST_HEIGHT);
  const bTopF = project(backX, GOAL_BOTTOM, POST_HEIGHT);
  const bBotN = project(backX, GOAL_TOP, 0);
  const bBotF = project(backX, GOAL_BOTTOM, 0);

  // Back panel first, then sides, then the front mouth — simple painter's
  // order so nearer panels overlap farther ones correctly.
  drawNetPanel(bTopN, bTopF, bBotN, bBotF, 6);
  drawNetPanel(fTopN, bTopN, fBotN, bBotN, 3);
  drawNetPanel(fTopF, bTopF, fBotF, bBotF, 3);
  drawNetPanel(fTopN, fTopF, fBotN, fBotF, 6);

  // Posts: because each post's base/top share the same world x & y and
  // differ only in height, they project to the same screenX — so these
  // draw as genuinely vertical lines, exactly like real goalposts.
  ctx.strokeStyle = '#eafaf0';
  ctx.lineWidth = 4;
  [[fBotN, fTopN], [fBotF, fTopF]].forEach(([base, top]) => {
    ctx.beginPath();
    ctx.moveTo(base.x, base.y);
    ctx.lineTo(top.x, top.y);
    ctx.stroke();
  });

  // Crossbar
  ctx.beginPath();
  ctx.moveTo(fTopN.x, fTopN.y);
  ctx.lineTo(fTopF.x, fTopF.y);
  ctx.stroke();
}

// Draws a net panel (hatched grid + frame) across 4 already-projected
// screen points using bilinear interpolation, so it works for any
// quadrilateral shape the projection produces (front, side, or back).
function drawNetPanel(topA, topB, botA, botB, steps) {
  function at(u, v) {
    const top = { x: topA.x + (topB.x - topA.x) * u, y: topA.y + (topB.y - topA.y) * u };
    const bot = { x: botA.x + (botB.x - botA.x) * u, y: botA.y + (botB.y - botA.y) * u };
    return { x: top.x + (bot.x - top.x) * v, y: top.y + (bot.y - top.y) * v };
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= steps; i++) {
    const u = i / steps;
    const a = at(u, 0), b = at(u, 1);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  for (let j = 0; j <= steps; j++) {
    const v = j / steps;
    const a = at(0, v), b = at(1, v);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }

  ctx.strokeStyle = 'rgba(234,250,240,0.8)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(topA.x, topA.y);
  ctx.lineTo(topB.x, topB.y);
  ctx.lineTo(botB.x, botB.y);
  ctx.lineTo(botA.x, botA.y);
  ctx.closePath();
  ctx.stroke();
}

// ---- Entities: ball, player, opponent, all drawn "standing" on the pitch ----
const PLAYER_VISUAL_HEIGHT = 34;
const BALL_VISUAL_HEIGHT = 8;

function drawEntitiesSorted() {
  // Painter's algorithm: draw whichever entity is "further away" (smaller
  // world Y, since Y is our depth axis) first, so nearer entities
  // correctly overlap farther ones instead of clipping through them.
  const items = [
    { e: ball, h: BALL_VISUAL_HEIGHT },
    { e: player, h: PLAYER_VISUAL_HEIGHT },
    { e: opponent, h: PLAYER_VISUAL_HEIGHT }
  ].sort((a, b) => a.e.y - b.e.y);

  items.forEach(item => drawStandingEntity(item.e, item.h));
}

function drawStandingEntity(entity, visualHeight) {
  // Ground shadow, flattened by the same projection as the pitch, so it
  // always looks glued to the ground regardless of camera angle.
  drawWorldCircleOutline(entity.x, entity.y, entity.radius * 0.9);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();

  const base = project(entity.x, entity.y, 0);
  const top = project(entity.x, entity.y, visualHeight);

  // A thin "pole" connecting the shadow to the body — this is what
  // actually sells the height/standing effect.
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(base.x, base.y);
  ctx.lineTo(top.x, top.y);
  ctx.stroke();

  // Body
  ctx.beginPath();
  ctx.arc(top.x, top.y, entity.radius, 0, Math.PI * 2);
  ctx.fillStyle = entity.color;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = entity.dark;
  ctx.stroke();
}

// Kick everything off
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
