<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Physics Soccer — v3 (2.5D)</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #10231a;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #eafaf0;
  }

  h1 {
    margin: 12px 0 4px;
    font-size: 22px;
    letter-spacing: 1px;
  }

  #hud {
    display: flex;
    gap: 32px;
    margin-bottom: 8px;
    font-size: 18px;
  }

  #instructions {
    margin-top: 8px;
    font-size: 13px;
    color: #9fcbb0;
    max-width: 700px;
    text-align: center;
  }

  canvas {
    background: #163a25;
    border: 6px solid #eafaf0;
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<h1>⚽ Physics Soccer — v3 (2.5D)</h1>
<div id="hud">
  <div>Blue (you): <span id="scoreLeft">0</span></div>
  <div>Red (AI): <span id="scoreRight">0</span></div>
</div>

<canvas id="field" width="1000" height="500"></canvas>

<div id="instructions">
  <strong>Click the field once to give it keyboard focus</strong>, then use
  WASD or Arrow Keys to move. Run into the ball to kick it. The red AI
  chases the ball too — beat it there and out-muscle it to score.
</div>

<script>
/* =====================================================================
   PHYSICS SOCCER — V3 (2.5D / oblique projection camera)

   THE BIG IDEA OF THIS VERSION:
   The physics simulation (positions, velocities, collisions) still runs
   entirely in flat, simple 2D "world" coordinates — nothing about
   movePlayer(), moveBall(), or the collision functions changes at all
   from v2. All we're adding is a PROJECTION step: a function that takes
   a world coordinate (and an optional height) and decides where that
   point should actually be drawn on screen.

   This separation — "simulation space" vs "render space" — is one of
   the most useful ideas in game dev. It's *why* we can bolt a totally
   different camera onto an already-working game without touching the
   game logic.
   ===================================================================== */

const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');

// ---- WORLD SPACE (unchanged from v2 — this is what the physics uses) ----
const FIELD_W = 800;
const FIELD_H = 500;

const GOAL_HEIGHT = 140; // gap in the goal line, in world units
const GOAL_TOP = (FIELD_H - GOAL_HEIGHT) / 2;
const GOAL_BOTTOM = GOAL_TOP + GOAL_HEIGHT;

let scoreLeft = 0;
let scoreRight = 0;

// After a goal, we freeze gameplay briefly and reset everyone to slightly
// staggered (not perfectly lined-up) positions. See the "why" note on
// resetAfterGoal() below — this is what actually fixes the restart bug.
let kickoffTimer = 0;
const KICKOFF_FREEZE_SECONDS = 1;

/* ---------------------------------------------------------------------
   THE PROJECTION (world -> screen)

   We fake a tilted camera with a simple "oblique projection":
     - TILT_Y   squashes the pitch's depth axis (world Y), which is what
                makes a flat rectangle read as "receding into the
                distance" instead of a plain bird's-eye view.
     - SHEAR_X  shifts points sideways based on how far along the depth
                axis they are, turning the pitch into a slanted
                parallelogram instead of a flat rectangle — this is the
                actual "isometric-ish" part.
     - height (wz) simply moves a point straight UP on screen, with no
                shear and no squash. That's the key trick: because a
                post's base and its top share the same world x/y, they
                only differ in wz, which means they land at the exact
                same screenX — so every vertical in the world renders as
                a perfectly vertical line on screen. That's what makes
                the goalposts (and the players) "stand up straight".
   --------------------------------------------------------------------- */
const TILT_Y = 0.75;
const SHEAR_X = 0.16;
const MARGIN_LEFT = 100;
const MARGIN_TOP = 120;

function project(wx, wy, wz = 0) {
  const depthShift = (wy - FIELD_H / 2) * SHEAR_X;
  return {
    x: MARGIN_LEFT + wx + depthShift,
    y: MARGIN_TOP + wy * TILT_Y - wz
  };
}

/* ---------------------------------------------------------------------
   1. THE GAME LOOP (identical to v2)
   --------------------------------------------------------------------- */
let lastTime = performance.now();

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 1 / 30);
  lastTime = now;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

/* ---------------------------------------------------------------------
   2. INPUT HANDLING (identical to v2)
   --------------------------------------------------------------------- */
const keys = {};
const MOVE_KEYS = ['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'];

window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  keys[key] = true;
  if (MOVE_KEYS.includes(key)) e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

canvas.tabIndex = 0;
canvas.style.outline = 'none';
canvas.addEventListener('click', () => canvas.focus());
window.addEventListener('load', () => canvas.focus());
canvas.focus();

/* ---------------------------------------------------------------------
   3. ENTITIES — still plain world-space objects, exactly like v2.
   Nothing here knows or cares that the camera is tilted.
   --------------------------------------------------------------------- */
const player = {
  x: FIELD_W / 2 - 150,
  y: FIELD_H / 2,
  vx: 0,
  vy: 0,
  knockX: 0,
  knockY: 0,
  radius: 16,
  speed: 220,
  color: '#3fa7ff',
  dark: '#1a4a7a',
  // ---- Head Soccer-style look (see drawHead/drawBoot) ----
  skin: '#e3a874',
  hairColor: '#e8b23d',   // messy blonde
  hairStyle: 'spiky',
  browColor: '#7a5a2a',
  eyeColor: '#3fae5c',    // green eyes
  jerseyColor: '#3fa7ff',
  bootColor: '#152233',
  bootAccent: '#3fa7ff'
};

const opponent = {
  x: FIELD_W / 2 + 150,
  y: FIELD_H / 2,
  vx: 0,
  vy: 0,
  knockX: 0,
  knockY: 0,
  radius: 16,
  speed: 190,
  color: '#ff5b5b',
  dark: '#7a1a1a',
  // ---- Head Soccer-style look, deliberately different from the player ----
  skin: '#d99a6c',
  hairColor: '#241a12',   // dark, side-swept hair
  hairStyle: 'side',
  browColor: '#150f0a',
  eyeColor: '#8a3b3b',    // brown-red eyes
  jerseyColor: '#ff5b5b',
  bootColor: '#1a1414',
  bootAccent: '#ff5b5b'
};

const ball = {
  x: FIELD_W / 2,
  y: FIELD_H / 2,
  vx: 0,
  vy: 0,
  radius: 10,
  color: '#fff8dc',
  dark: '#c9a86a'
};

const FRICTION_PER_SECOND = 0.35;

/* ---------------------------------------------------------------------
   4. UPDATE — 100% identical logic to v2. This is the payoff of having
   kept physics and rendering separate: swapping the whole camera model
   required zero changes below this line.
   --------------------------------------------------------------------- */
function update(dt) {
  if (kickoffTimer > 0) {
    kickoffTimer = Math.max(0, kickoffTimer - dt);
    return; // hold everyone in place during the kickoff pause
  }
  movePlayer(dt);
  updateOpponentAI(dt);
  moveBall(dt);
  handleEntityBallCollision(player);
  resolveBallWalls();
  handleEntityBallCollision(opponent);
  resolveBallWalls();
  handleEntityCollision(player, opponent);

  // handleEntityCollision can push either entity past the field boundary
  // (it only knows about the other entity, not the walls) — re-clamp here
  // so a shove near the edge can't shunt someone out of bounds.
  player.x = clamp(player.x, player.radius, FIELD_W - player.radius);
  player.y = clamp(player.y, player.radius, FIELD_H - player.radius);
  opponent.x = clamp(opponent.x, opponent.radius, FIELD_W - opponent.radius);
  opponent.y = clamp(opponent.y, opponent.radius, FIELD_H - opponent.radius);

  handleGoals();
}

function movePlayer(dt) {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    dx /= len;
    dy /= len;
  }

  player.vx = dx * player.speed;
  player.vy = dy * player.speed;

  player.x += player.vx * dt;
  player.y += player.vy * dt;

  applyKnockback(player, dt);

  player.x = clamp(player.x, player.radius, FIELD_W - player.radius);
  player.y = clamp(player.y, player.radius, FIELD_H - player.radius);
}

/* ---------------------------------------------------------------------
   AI OPPONENT — "seek" blended with "separation" (classic steering
   behaviors). Pure seek (v2) just walks straight at the ball, which
   means it also walks straight through the player whenever they're in
   the way — that's the "opponent just runs into me" feeling. Blending
   in a separation force that pushes the AI away from the player when
   they're close makes it curve around instead.
   --------------------------------------------------------------------- */
function updateOpponentAI(dt) {
  const toBallX = ball.x - opponent.x;
  const toBallY = ball.y - opponent.y;
  const distBall = Math.hypot(toBallX, toBallY);

  let seekX = 0, seekY = 0;
  if (distBall > 1) {
    seekX = toBallX / distBall;
    seekY = toBallY / distBall;
  }

  const awayX = opponent.x - player.x;
  const awayY = opponent.y - player.y;
  const distPlayer = Math.hypot(awayX, awayY);
  const SEPARATION_RADIUS = opponent.radius + player.radius + 40;

  let sepX = 0, sepY = 0;
  if (distPlayer > 0 && distPlayer < SEPARATION_RADIUS) {
    // Closer = stronger push away, so it only kicks in when actually crowded
    const strength = 1 - distPlayer / SEPARATION_RADIUS;
    sepX = (awayX / distPlayer) * strength;
    sepY = (awayY / distPlayer) * strength;
  }

  let steerX = seekX + sepX * 1.3;
  let steerY = seekY + sepY * 1.3;
  const steerLen = Math.hypot(steerX, steerY);
  if (steerLen > 0) {
    steerX /= steerLen;
    steerY /= steerLen;
  }

  opponent.vx = steerX * opponent.speed;
  opponent.vy = steerY * opponent.speed;

  opponent.x += opponent.vx * dt;
  opponent.y += opponent.vy * dt;

  applyKnockback(opponent, dt);

  opponent.x = clamp(opponent.x, opponent.radius, FIELD_W - opponent.radius);
  opponent.y = clamp(opponent.y, opponent.radius, FIELD_H - opponent.radius);
}

// Knockback is tracked separately from normal movement/AI velocity so a
// physical shove actually displaces someone for a moment, instead of
// being erased the instant WASD input or the AI's own steering runs
// again next frame. It decays on its own, like the ball's friction.
const KNOCKBACK_FRICTION_PER_SECOND = 0.9; // fraction of knockback lost per second — fast, so it reads as a stagger, not a shove that lasts forever

function applyKnockback(entity, dt) {
  const decay = Math.pow(1 - KNOCKBACK_FRICTION_PER_SECOND, dt);
  entity.knockX *= decay;
  entity.knockY *= decay;
  if (Math.hypot(entity.knockX, entity.knockY) < 2) {
    entity.knockX = 0;
    entity.knockY = 0;
  }
  entity.x += entity.knockX * dt;
  entity.y += entity.knockY * dt;
}

function moveBall(dt) {
  const frictionFactor = Math.pow(1 - FRICTION_PER_SECOND, dt);
  ball.vx *= frictionFactor;
  ball.vy *= frictionFactor;

  if (Math.hypot(ball.vx, ball.vy) < 2) {
    ball.vx = 0;
    ball.vy = 0;
  }

  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  resolveBallWalls();
}

// BUG FIX: this used to live only inside moveBall(). But
// handleEntityBallCollision() can push the ball's position too (to
// resolve overlap with a player), and that push had no idea where the
// walls were. In a corner, the sequence was: moveBall() clamps the ball
// just inside the wall -> a player standing right there immediately
// shoves it back out past the wall via the *ball* collision -> next
// frame moveBall() clamps it back in again -> repeat forever. The ball
// looked permanently welded to the corner. Re-running this same wall
// check after every collision (not just after normal movement) fixes
// it: the ball can never end up outside the legal field no matter what
// pushed it there.
function resolveBallWalls() {
  if (ball.y - ball.radius < 0) {
    ball.y = ball.radius;
    ball.vy = Math.abs(ball.vy) * 0.7;
  }
  if (ball.y + ball.radius > FIELD_H) {
    ball.y = FIELD_H - ball.radius;
    ball.vy = -Math.abs(ball.vy) * 0.7;
  }

  const inGoalGapY = ball.y > GOAL_TOP && ball.y < GOAL_BOTTOM;

  if (!inGoalGapY) {
    if (ball.x - ball.radius < 0) {
      ball.x = ball.radius;
      ball.vx = Math.abs(ball.vx) * 0.7;
    }
    if (ball.x + ball.radius > FIELD_W) {
      ball.x = FIELD_W - ball.radius;
      ball.vx = -Math.abs(ball.vx) * 0.7;
    }
  }
}

function handleEntityBallCollision(entity) {
  const dx = ball.x - entity.x;
  const dy = ball.y - entity.y;
  const dist = Math.hypot(dx, dy);
  const minDist = entity.radius + ball.radius;

  if (dist < minDist && dist > 0) {
    const overlap = minDist - dist;
    const nx = dx / dist;
    const ny = dy / dist;
    ball.x += nx * overlap;
    ball.y += ny * overlap;

    const kickPower = 1.4;
    ball.vx = nx * Math.hypot(entity.vx, entity.vy) * kickPower + entity.vx * 0.3;
    ball.vy = ny * Math.hypot(entity.vx, entity.vy) * kickPower + entity.vy * 0.3;
  }
}

function handleEntityCollision(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.hypot(dx, dy);
  const minDist = a.radius + b.radius;

  if (dist < minDist && dist > 0) {
    const overlap = (minDist - dist) / 2;
    const nx = dx / dist;
    const ny = dy / dist;
    a.x -= nx * overlap;
    a.y -= ny * overlap;
    b.x += nx * overlap;
    b.y += ny * overlap;

    // A real shove: whoever was moving faster into the other imparts a
    // knockback impulse. Without this, "pushing" someone did nothing —
    // they'd just get repositioned by the overlap fix, then immediately
    // walk straight back since nothing ever displaced their velocity.
    const KNOCK_STRENGTH = 0.55;
    const aSpeed = Math.hypot(a.vx, a.vy);
    const bSpeed = Math.hypot(b.vx, b.vy);
    b.knockX += nx * aSpeed * KNOCK_STRENGTH;
    b.knockY += ny * aSpeed * KNOCK_STRENGTH;
    a.knockX -= nx * bSpeed * KNOCK_STRENGTH;
    a.knockY -= ny * bSpeed * KNOCK_STRENGTH;
  }
}

function handleGoals() {
  if (ball.x + ball.radius < 0) {
    scoreRight++;
    document.getElementById('scoreRight').textContent = scoreRight;
    resetAfterGoal();
  }
  if (ball.x - ball.radius > FIELD_W) {
    scoreLeft++;
    document.getElementById('scoreLeft').textContent = scoreLeft;
    resetAfterGoal();
  }
}

function resetAfterGoal() {
  // BUG FIX: the old reset put the ball and both players dead-center on
  // the exact same horizontal line as both goal mouths. That meant the
  // very next AI-ball collision would send the ball dead straight
  // through a goal again — it looked like the game "never restarted"
  // because it kept re-scoring instantly. Staggering everyone off that
  // line, plus a short freeze below, fixes it.
  ball.x = FIELD_W / 2;
  ball.y = FIELD_H / 2;
  ball.vx = 0;
  ball.vy = 0;
  player.x = FIELD_W / 2 - 150;
  player.y = FIELD_H / 2 - 60;
  opponent.x = FIELD_W / 2 + 150;
  opponent.y = FIELD_H / 2 + 60;
  opponent.vx = 0;
  opponent.vy = 0;

  kickoffTimer = KICKOFF_FREEZE_SECONDS;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

/* ---------------------------------------------------------------------
   5. RENDER — this is the part that's genuinely new in v3. Everything
   below draws through project(), never touches raw world coordinates
   directly on the canvas.
   --------------------------------------------------------------------- */
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawPitch();
  drawGoal(true);
  drawGoal(false);
  drawEntitiesSorted();

  if (kickoffTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#eafaf0';
    ctx.font = 'bold 36px Segoe UI, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Kickoff!', canvas.width / 2, canvas.height / 2);
    ctx.textAlign = 'start';
  }
}

// ---- Pitch (ground plane) ----
function drawPitch() {
  const corners = [
    project(0, 0), project(FIELD_W, 0),
    project(FIELD_W, FIELD_H), project(0, FIELD_H)
  ];

  ctx.fillStyle = '#2e7d4f';
  ctx.beginPath();
  ctx.moveTo(corners[0].x, corners[0].y);
  for (let i = 1; i < corners.length; i++) ctx.lineTo(corners[i].x, corners[i].y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Center line: a straight line in world space, still straight (but
  // now diagonal) after projection since project() is a linear map.
  const midTop = project(FIELD_W / 2, 0);
  const midBottom = project(FIELD_W / 2, FIELD_H);
  ctx.beginPath();
  ctx.moveTo(midTop.x, midTop.y);
  ctx.lineTo(midBottom.x, midBottom.y);
  ctx.stroke();

  // Center circle: a circle in world space becomes an ellipse-ish shape
  // after our shear+squash, so we sample points around it rather than
  // using ctx.arc (which only draws true circles).
  drawWorldCircleOutline(FIELD_W / 2, FIELD_H / 2, 50);
}

function drawWorldCircleOutline(wx, wy, radius, steps = 40) {
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    const p = project(wx + Math.cos(a) * radius, wy + Math.sin(a) * radius, 0);
    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
}

// ---- Goals: real upright 3D-ish boxes made of projected quads ----
const POST_HEIGHT = 90;     // visual height of the goal frame, in world units
const GOAL_DEPTH = 45;      // how far the net extends behind the goal line

function drawGoal(isLeft) {
  const frontX = isLeft ? 0 : FIELD_W;
  const backX = isLeft ? -GOAL_DEPTH : FIELD_W + GOAL_DEPTH;

  // The 8 corners of the goal "box": front/back x top/bottom(depth) x ground/height
  const fTopN = project(frontX, GOAL_TOP, POST_HEIGHT);
  const fTopF = project(frontX, GOAL_BOTTOM, POST_HEIGHT);
  const fBotN = project(frontX, GOAL_TOP, 0);
  const fBotF = project(frontX, GOAL_BOTTOM, 0);

  const bTopN = project(backX, GOAL_TOP, POST_HEIGHT);
  const bTopF = project(backX, GOAL_BOTTOM, POST_HEIGHT);
  const bBotN = project(backX, GOAL_TOP, 0);
  const bBotF = project(backX, GOAL_BOTTOM, 0);

  // Back panel first, then sides, then the front mouth — simple painter's
  // order so nearer panels overlap farther ones correctly.
  drawNetPanel(bTopN, bTopF, bBotN, bBotF, 6);
  drawNetPanel(fTopN, bTopN, fBotN, bBotN, 3);
  drawNetPanel(fTopF, bTopF, fBotF, bBotF, 3);
  drawNetPanel(fTopN, fTopF, fBotN, fBotF, 6);

  // Posts: because each post's base/top share the same world x & y and
  // differ only in height, they project to the same screenX — so these
  // draw as genuinely vertical lines, exactly like real goalposts.
  ctx.strokeStyle = '#eafaf0';
  ctx.lineWidth = 4;
  [[fBotN, fTopN], [fBotF, fTopF]].forEach(([base, top]) => {
    ctx.beginPath();
    ctx.moveTo(base.x, base.y);
    ctx.lineTo(top.x, top.y);
    ctx.stroke();
  });

  // Crossbar
  ctx.beginPath();
  ctx.moveTo(fTopN.x, fTopN.y);
  ctx.lineTo(fTopF.x, fTopF.y);
  ctx.stroke();
}

// Draws a net panel (hatched grid + frame) across 4 already-projected
// screen points using bilinear interpolation, so it works for any
// quadrilateral shape the projection produces (front, side, or back).
function drawNetPanel(topA, topB, botA, botB, steps) {
  function at(u, v) {
    const top = { x: topA.x + (topB.x - topA.x) * u, y: topA.y + (topB.y - topA.y) * u };
    const bot = { x: botA.x + (botB.x - botA.x) * u, y: botA.y + (botB.y - botA.y) * u };
    return { x: top.x + (bot.x - top.x) * v, y: top.y + (bot.y - top.y) * v };
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= steps; i++) {
    const u = i / steps;
    const a = at(u, 0), b = at(u, 1);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  for (let j = 0; j <= steps; j++) {
    const v = j / steps;
    const a = at(0, v), b = at(1, v);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }

  ctx.strokeStyle = 'rgba(234,250,240,0.8)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(topA.x, topA.y);
  ctx.lineTo(topB.x, topB.y);
  ctx.lineTo(botB.x, botB.y);
  ctx.lineTo(botA.x, botA.y);
  ctx.closePath();
  ctx.stroke();
}

// ---- Entities: ball, player, opponent, all drawn "standing" on the pitch ----
const HEAD_HEIGHT = 48;   // how high the head floats above the ground, in world units
const BOOT_HEIGHT = 14;   // how high the boot floats above the ground (the visible "gap")
const BALL_VISUAL_HEIGHT = 8;

function drawEntitiesSorted() {
  // Painter's algorithm: draw whichever entity is "further away" (smaller
  // world Y, since Y is our depth axis) first, so nearer entities
  // correctly overlap farther ones instead of clipping through them.
  const items = [
    { e: player, kind: 'player' },
    { e: opponent, kind: 'player' },
    { e: ball, kind: 'ball' }
  ].sort((a, b) => a.e.y - b.e.y);

  items.forEach(item => {
    if (item.kind === 'ball') drawBall(item.e);
    else drawCharacter(item.e);
  });
}

// The ball just rolls on the ground — a shadow plus a circle drawn at a
// small fixed height reads as a rolling ball, no extra decoration needed.
function drawBall(entity) {
  drawWorldCircleOutline(entity.x, entity.y, entity.radius * 0.8);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();

  const p = project(entity.x, entity.y, BALL_VISUAL_HEIGHT);
  ctx.beginPath();
  ctx.arc(p.x, p.y, entity.radius, 0, Math.PI * 2);
  ctx.fillStyle = entity.color;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = entity.dark;
  ctx.stroke();
}

/* =======================================================================
   "HEAD SOCCER" STYLE CHARACTER — giant head directly above a floating
   boot, no body in between. Everything below is drawn with plain canvas
   primitives (arcs, ellipses, paths, rounded rects) — no image assets.

   IMPORTANT — why these look "vertically upright" on a tilted pitch:
   project(entity.x, entity.y, height) collapses the whole character down
   to a single 2D screen point (screenX, screenY). Every shape below is
   then drawn as ordinary, un-skewed 2D canvas art *around that one
   point* — eyebrows, hair, boot laces, all of it. None of those shapes
   are individually run back through the world projection, so none of
   them inherit the pitch's shear or squash. That's what keeps the
   characters looking like flat, upright cutouts standing on a tilted
   floor, instead of leaning with the camera angle.
   ======================================================================= */
function drawCharacter(entity) {
  // Ground shadow first, so everything else draws on top of it
  drawWorldCircleOutline(entity.x, entity.y, entity.radius * 1.1);
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.fill();

  const bootAnchor = project(entity.x, entity.y, BOOT_HEIGHT);
  const headAnchor = project(entity.x, entity.y, HEAD_HEIGHT);

  drawBoot(bootAnchor.x, bootAnchor.y, entity);
  drawHead(headAnchor.x, headAnchor.y, entity);
}

// Small helper: a rounded rectangle path, since not every browser
// supports ctx.roundRect() yet.
function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBoot(cx, cy, entity) {
  const w = entity.radius * 2.7;
  const h = entity.radius * 1.4;

  ctx.save();
  ctx.translate(cx, cy);

  // Sole
  ctx.fillStyle = '#141414';
  roundRectPath(-w * 0.5, h * 0.22, w, h * 0.24, h * 0.1);
  ctx.fill();

  // Main boot body
  ctx.beginPath();
  ctx.ellipse(0, 0, w * 0.5, h * 0.42, 0, 0, Math.PI * 2);
  ctx.fillStyle = entity.bootColor;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.stroke();

  // Ankle cuff
  roundRectPath(-w * 0.16, -h * 0.85, w * 0.32, h * 0.55, w * 0.08);
  ctx.fillStyle = entity.bootColor;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.stroke();

  // Team-colored accent stripe
  ctx.strokeStyle = entity.bootAccent;
  ctx.lineWidth = Math.max(2, h * 0.14);
  ctx.beginPath();
  ctx.moveTo(-w * 0.34, -h * 0.02);
  ctx.lineTo(w * 0.34, -h * 0.02);
  ctx.stroke();

  // Laces
  ctx.strokeStyle = '#f4f4f4';
  ctx.lineWidth = 1.5;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(i * w * 0.09 - w * 0.05, -h * 0.55);
    ctx.lineTo(i * w * 0.09 + w * 0.05, -h * 0.22);
    ctx.stroke();
  }

  ctx.restore();
}

function drawHead(cx, cy, entity) {
  const R = entity.radius * 1.9;

  ctx.save();
  ctx.translate(cx, cy);

  // Jersey collar, peeking out beneath the chin (drawn first so the
  // head overlaps the top of it, like a neck emerging from a shirt)
  roundRectPath(-R * 0.55, R * 0.55, R * 1.1, R * 0.55, R * 0.15);
  ctx.fillStyle = entity.jerseyColor;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.stroke();

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-R * 0.2, R * 0.55);
  ctx.lineTo(0, R * 0.82);
  ctx.lineTo(R * 0.2, R * 0.55);
  ctx.stroke();

  // Ears
  ctx.fillStyle = entity.skin;
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side * R * 0.92, R * 0.05, R * 0.18, R * 0.24, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.stroke();
  });

  // Head
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.fillStyle = entity.skin;
  ctx.fill();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.stroke();

  drawHair(entity, R);

  // Eyebrows, angled inward for an intense "game face"
  ctx.strokeStyle = entity.browColor;
  ctx.lineWidth = R * 0.14;
  ctx.lineCap = 'round';
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.moveTo(side * R * 0.14, -R * 0.1);
    ctx.lineTo(side * R * 0.5, -R * 0.3);
    ctx.stroke();
  });

  // Eyes
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side * R * 0.35, R * 0.03, R * 0.16, R * 0.12, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(side * R * 0.37, R * 0.04, R * 0.07, 0, Math.PI * 2);
    ctx.fillStyle = entity.eyeColor;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(side * R * 0.37, R * 0.04, R * 0.03, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
  });

  // Nose
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, R * 0.1);
  ctx.lineTo(-R * 0.05, R * 0.3);
  ctx.lineTo(R * 0.05, R * 0.3);
  ctx.stroke();

  // Mouth: open, shouting — matches the "game face" energy of the style
  ctx.beginPath();
  ctx.ellipse(0, R * 0.5, R * 0.26, R * 0.13, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#5c2020';
  ctx.fill();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.stroke();

  ctx.fillStyle = '#fff';
  roundRectPath(-R * 0.2, R * 0.4, R * 0.4, R * 0.09, R * 0.03);
  ctx.fill();

  ctx.restore();
}

function drawHair(entity, R) {
  ctx.fillStyle = entity.hairColor;
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';

  if (entity.hairStyle === 'spiky') {
    // Messy spiked-up tufts across the top of the head
    ctx.beginPath();
    ctx.moveTo(-R * 0.9, -R * 0.3);
    const spikes = 6;
    for (let i = 0; i <= spikes; i++) {
      const t = i / spikes;
      const x = -R * 0.9 + t * R * 1.8;
      const y = -R * 0.75 - (i % 2 === 0 ? R * 0.25 : R * 0.05);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(R * 0.9, -R * 0.05);
    ctx.quadraticCurveTo(0, -R * 0.5, -R * 0.9, -R * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  } else {
    // Side-swept hair, sweeping from a high point down over one side
    ctx.beginPath();
    ctx.moveTo(-R * 0.85, 0);
    ctx.quadraticCurveTo(-R * 0.9, -R * 0.85, -R * 0.1, -R * 0.85);
    ctx.quadraticCurveTo(R * 0.75, -R * 0.85, R * 0.85, -R * 0.2);
    ctx.quadraticCurveTo(R * 0.5, -R * 0.45, R * 0.1, -R * 0.55);
    ctx.quadraticCurveTo(-R * 0.3, -R * 0.6, -R * 0.6, -R * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

// Kick everything off
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
