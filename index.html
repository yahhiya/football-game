<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Head Soccer — v4 (2D side view)</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #10231a;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #eafaf0;
  }

  h1 {
    margin: 12px 0 4px;
    font-size: 22px;
    letter-spacing: 1px;
  }

  #hud {
    display: flex;
    gap: 32px;
    margin-bottom: 8px;
    font-size: 18px;
  }

  #instructions {
    margin-top: 8px;
    font-size: 13px;
    color: #9fcbb0;
    max-width: 700px;
    text-align: center;
  }

  canvas {
    background: #0d2a1c;
    border: 6px solid #eafaf0;
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<h1>⚽ Head Soccer — v4 (2D side view)</h1>
<div id="hud">
  <div>Blue (you): <span id="scoreLeft">0</span></div>
  <div>Red (AI): <span id="scoreRight">0</span></div>
</div>

<canvas id="field" width="900" height="500"></canvas>

<div id="instructions">
  <strong>Click the field once to give it keyboard focus.</strong>
  A/D or Left/Right to move. W, Up, or Space to jump. Headbutt or kick the
  ball into the opponent's goal.
</div>

<script>
/* =====================================================================
   HEAD SOCCER — V4 (flat 2D side view, gravity-based physics)

   BIG CHANGE FROM V3: this version has no camera projection at all. In
   v3 we had to invent project(x, y, height) to fake a tilted 3D-ish
   camera. Here the game genuinely IS 2D and side-on, so world
   coordinates and screen coordinates are (almost) the same thing — the
   only conversion left is flipping "height above the ground" into a
   screen Y, since height counts UP but screen Y counts DOWN. That's it.
   Everything else got simpler, not more complex, by matching the
   camera to the game instead of faking one.
   ===================================================================== */

const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');

const CANVAS_W = canvas.width;
const CANVAS_H = canvas.height;

// ---- The pitch, in plain screen coordinates ----
const GROUND_Y = 420;          // the horizontal line everything stands on
const GOAL_X_LEFT = 90;        // left goal line (x position)
const GOAL_X_RIGHT = 810;      // right goal line (x position)
const GOAL_HEIGHT = 170;       // how tall the goal opening is
const GOAL_NET_DEPTH = 55;     // how far the net extends behind the goal line
const CEILING_H = GROUND_Y - 30; // soft ceiling so nothing flies off-canvas forever

let scoreLeft = 0;
let scoreRight = 0;

let kickoffTimer = 0;
const KICKOFF_FREEZE_SECONDS = 1;

/* ---------------------------------------------------------------------
   HEIGHT <-> SCREEN CONVERSION
   Every entity tracks a "height above ground" (h), where 0 = standing
   on the ground and larger = higher in the air. Gravity just subtracts
   from vertical velocity every frame — no different from any falling-
   body physics problem. To actually draw something we flip it into a
   screen Y coordinate once, right before drawing.
   --------------------------------------------------------------------- */
function groundToScreenY(h) {
  return GROUND_Y - h;
}

/* ---------------------------------------------------------------------
   1. THE GAME LOOP (unchanged pattern from v2/v3)
   --------------------------------------------------------------------- */
let lastTime = performance.now();

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 1 / 30);
  lastTime = now;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

/* ---------------------------------------------------------------------
   2. INPUT HANDLING
   Only three actions now: move left, move right, jump. Jump uses W,
   Up, or Space so whichever feels natural to your hand works.
   --------------------------------------------------------------------- */
const keys = {};
const MOVE_KEYS = ['a', 'd', 'arrowleft', 'arrowright', 'w', 'arrowup', ' '];

window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  keys[key] = true;
  if (MOVE_KEYS.includes(key)) e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

canvas.tabIndex = 0;
canvas.style.outline = 'none';
canvas.addEventListener('click', () => canvas.focus());
window.addEventListener('load', () => canvas.focus());
canvas.focus();

/* ---------------------------------------------------------------------
   3. ENTITIES
   x        — horizontal position (the only axis players move under
              their own power)
   h        — height above the ground (0 = grounded)
   vx, vh   — horizontal and vertical velocity
   grounded — true when h === 0, used to decide "can I jump right now?"
   knockX   — a separate horizontal "shove" velocity from collisions,
              decays on its own (same idea as v3's knockback system)
   radius   — a scale factor the head/boot drawing code uses; also
              doubles as the shadow size
   --------------------------------------------------------------------- */
const player = {
  x: GOAL_X_LEFT + 180,
  h: 0,
  vx: 0,
  vh: 0,
  grounded: true,
  knockX: 0,
  radius: 16,
  speed: 260,
  skin: '#e3a874',
  hairColor: '#e8b23d',
  hairStyle: 'spiky',
  browColor: '#7a5a2a',
  eyeColor: '#3fae5c',
  jerseyColor: '#3fa7ff',
  bootColor: '#152233',
  bootAccent: '#3fa7ff'
};

const opponent = {
  x: GOAL_X_RIGHT - 180,
  h: 0,
  vx: 0,
  vh: 0,
  grounded: true,
  knockX: 0,
  radius: 16,
  speed: 230,
  skin: '#d99a6c',
  hairColor: '#241a12',
  hairStyle: 'side',
  browColor: '#150f0a',
  eyeColor: '#8a3b3b',
  jerseyColor: '#ff5b5b',
  bootColor: '#1a1414',
  bootAccent: '#ff5b5b'
};

const ball = {
  x: CANVAS_W / 2,
  h: 220,
  vx: 0,
  vh: 0,
  radius: 15,
  color: '#fff8dc',
  dark: '#c9a86a'
};

// ---- Tuning constants ----
const GRAVITY_PLAYER = 1600;
const JUMP_VELOCITY = 620;

const GRAVITY_BALL = 1300;
const BALL_GROUND_RESTITUTION = 0.62; // how much bounce energy survives hitting the ground
const BALL_WALL_RESTITUTION = 0.55;
const BALL_AIR_DRAG_PER_SECOND = 0.05;    // very light — the ball should carry through the air
const BALL_GROUND_FRICTION_PER_SECOND = 0.5;

const HEAD_COLLISION_RADIUS = 30;
const BOOT_COLLISION_RADIUS = 18;
const HEAD_OFFSET = 78;  // how far above the feet the head sits
const BOOT_OFFSET = 8;   // how far above the feet the boot's kicking point sits

const KNOCKBACK_FRICTION_PER_SECOND = 0.9;

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

/* ---------------------------------------------------------------------
   4. UPDATE
   --------------------------------------------------------------------- */
function update(dt) {
  if (kickoffTimer > 0) {
    kickoffTimer = Math.max(0, kickoffTimer - dt);
    // Let the ball keep falling during the kickoff pause — it visibly
    // drops in and settles, like a real kickoff, while players hold.
    moveBall(dt);
    return;
  }

  movePlayer(dt);
  updateOpponentAI(dt);
  moveBall(dt);

  handleEntityBallCollision(player);
  resolveBallWalls();
  handleEntityBallCollision(opponent);
  resolveBallWalls();

  handleBodyCollision(player, opponent);
  player.x = clamp(player.x, GOAL_X_LEFT + player.radius, GOAL_X_RIGHT - player.radius);
  opponent.x = clamp(opponent.x, GOAL_X_LEFT + opponent.radius, GOAL_X_RIGHT - opponent.radius);

  handleGoals();
}

function movePlayer(dt) {
  let dir = 0;
  if (keys['a'] || keys['arrowleft']) dir -= 1;
  if (keys['d'] || keys['arrowright']) dir += 1;

  player.vx = dir * player.speed;
  player.x += player.vx * dt;

  if ((keys['w'] || keys['arrowup'] || keys[' ']) && player.grounded) {
    player.vh = JUMP_VELOCITY;
    player.grounded = false;
  }

  applyGravity(player, dt);
  applyKnockback(player, dt);

  player.x = clamp(player.x, GOAL_X_LEFT + player.radius, GOAL_X_RIGHT - player.radius);
}

/* ---------------------------------------------------------------------
   AI OPPONENT — seek the ball horizontally, jump when it's close and
   up in the air, and steer away from the player when crowded (same
   "seek + separation" blend as v3, just collapsed to one axis).
   --------------------------------------------------------------------- */
function updateOpponentAI(dt) {
  const toBallX = ball.x - opponent.x;
  let desiredDir = 0;
  if (Math.abs(toBallX) > 4) desiredDir = Math.sign(toBallX);

  const awayX = opponent.x - player.x;
  const distPlayer = Math.abs(awayX);
  const SEPARATION_RANGE = opponent.radius + player.radius + 34;
  let sepDir = 0;
  if (distPlayer > 0 && distPlayer < SEPARATION_RANGE) {
    sepDir = Math.sign(awayX) * (1 - distPlayer / SEPARATION_RANGE);
  }

  let steer = clamp(desiredDir + sepDir * 1.3, -1, 1);
  opponent.vx = steer * opponent.speed;
  opponent.x += opponent.vx * dt;

  const ballIsClose = Math.abs(ball.x - opponent.x) < 70;
  const ballIsUp = ball.h > 50;
  if (ballIsClose && ballIsUp && opponent.grounded) {
    opponent.vh = JUMP_VELOCITY;
    opponent.grounded = false;
  }

  applyGravity(opponent, dt);
  applyKnockback(opponent, dt);

  opponent.x = clamp(opponent.x, GOAL_X_LEFT + opponent.radius, GOAL_X_RIGHT - opponent.radius);
}

// Shared by player and AI: fall under gravity, land on the ground.
function applyGravity(entity, dt) {
  entity.vh -= GRAVITY_PLAYER * dt;
  entity.h += entity.vh * dt;

  if (entity.h <= 0) {
    entity.h = 0;
    entity.vh = 0;
    entity.grounded = true;
  } else {
    entity.grounded = false;
  }
}

// Knockback: a separate "shove" velocity so a body collision can
// actually displace someone, instead of being instantly overwritten by
// their own WASD input or AI steering next frame.
function applyKnockback(entity, dt) {
  const decay = Math.pow(1 - KNOCKBACK_FRICTION_PER_SECOND, dt);
  entity.knockX *= decay;
  if (Math.abs(entity.knockX) < 2) entity.knockX = 0;
  entity.x += entity.knockX * dt;
}

function moveBall(dt) {
  ball.vh -= GRAVITY_BALL * dt;

  if (ball.h > 0) {
    // Light air resistance — the ball should carry through its arc
    const airDrag = Math.pow(1 - BALL_AIR_DRAG_PER_SECOND, dt);
    ball.vx *= airDrag;
  } else {
    // Rolling friction once it's on the ground
    const groundFriction = Math.pow(1 - BALL_GROUND_FRICTION_PER_SECOND, dt);
    ball.vx *= groundFriction;
    if (Math.abs(ball.vx) < 2) ball.vx = 0;
  }

  ball.x += ball.vx * dt;
  ball.h += ball.vh * dt;

  resolveBallWalls();
}

// LESSON CARRIED OVER FROM V3: any function that can move the ball
// needs to re-check the walls/ground afterward, or two different
// pieces of collision code can fight each other and pin the ball
// somewhere illegal (that was the "stuck in the corner" bug last time).
// Here that means calling this after moveBall() AND after every
// player/AI collision with the ball.
function resolveBallWalls() {
  // Ground bounce
  if (ball.h < 0) {
    ball.h = 0;
    if (ball.vh < 0) ball.vh = -ball.vh * BALL_GROUND_RESTITUTION;
    if (Math.abs(ball.vh) < 40) ball.vh = 0; // let it actually settle instead of micro-bouncing forever
  }

  // Soft ceiling, so a big hit can't send it flying off-canvas forever
  if (ball.h > CEILING_H) {
    ball.h = CEILING_H;
    if (ball.vh > 0) ball.vh = -Math.abs(ball.vh) * 0.5;
  }

  // Side walls double as the goal frame: below GOAL_HEIGHT, the ball is
  // allowed through (that's the goal mouth); above it, it's a solid
  // wall and bounces back — which naturally acts like hitting the post.
  const inGoalOpening = ball.h < GOAL_HEIGHT;
  if (!inGoalOpening) {
    if (ball.x - ball.radius < GOAL_X_LEFT) {
      ball.x = GOAL_X_LEFT + ball.radius;
      ball.vx = Math.abs(ball.vx) * BALL_WALL_RESTITUTION;
    }
    if (ball.x + ball.radius > GOAL_X_RIGHT) {
      ball.x = GOAL_X_RIGHT - ball.radius;
      ball.vx = -Math.abs(ball.vx) * BALL_WALL_RESTITUTION;
    }
  }
}

/* ---------------------------------------------------------------------
   COLLISIONS
   Both use plain circle-vs-circle math, just like v2/v3, except the
   second coordinate is now "height" instead of "world depth".
   --------------------------------------------------------------------- */
function circleBallCollision(cx, cHeight, cRadius, sourceVx, sourceVh, kickPower) {
  const dx = ball.x - cx;
  const dh = ball.h - cHeight;
  const dist = Math.hypot(dx, dh);
  const minDist = cRadius + ball.radius;

  if (dist < minDist && dist > 0) {
    const overlap = minDist - dist;
    const nx = dx / dist;
    const nh = dh / dist;
    ball.x += nx * overlap;
    ball.h += nh * overlap;

    const sourceSpeed = Math.hypot(sourceVx, sourceVh);
    ball.vx = nx * sourceSpeed * kickPower + sourceVx * 0.3;
    ball.vh = nh * sourceSpeed * kickPower + sourceVh * 0.3;
    return true;
  }
  return false;
}

function handleEntityBallCollision(entity) {
  const headCY = entity.h + HEAD_OFFSET;
  const bootCY = entity.h + BOOT_OFFSET;

  // Check the head first (bigger target); only test the boot if the
  // head didn't already connect, so one contact doesn't double-kick.
  const headHit = circleBallCollision(entity.x, headCY, HEAD_COLLISION_RADIUS, entity.vx, entity.vh, 1.25);
  if (!headHit) {
    circleBallCollision(entity.x, bootCY, BOOT_COLLISION_RADIUS, entity.vx, entity.vh, 1.5);
  }
}

function handleBodyCollision(a, b) {
  const dx = b.x - a.x;
  const distX = Math.abs(dx);
  const minDist = a.radius * 2 + b.radius * 2;
  const heightDiff = Math.abs(a.h - b.h);

  // Only collide if they're roughly at the same height — lets a
  // jumping player pass clean over a grounded one instead of shoving
  // through them mid-air.
  if (distX < minDist && distX > 0 && heightDiff < HEAD_COLLISION_RADIUS * 1.5) {
    const overlap = (minDist - distX) / 2;
    const dir = Math.sign(dx);
    a.x -= dir * overlap;
    b.x += dir * overlap;

    const KNOCK_STRENGTH = 0.5;
    const aSpeed = Math.abs(a.vx);
    const bSpeed = Math.abs(b.vx);
    b.knockX += dir * aSpeed * KNOCK_STRENGTH;
    a.knockX -= dir * bSpeed * KNOCK_STRENGTH;
  }
}

function handleGoals() {
  if (ball.x + ball.radius < GOAL_X_LEFT) {
    scoreRight++;
    document.getElementById('scoreRight').textContent = scoreRight;
    resetAfterGoal();
  }
  if (ball.x - ball.radius > GOAL_X_RIGHT) {
    scoreLeft++;
    document.getElementById('scoreLeft').textContent = scoreLeft;
    resetAfterGoal();
  }
}

function resetAfterGoal() {
  ball.x = CANVAS_W / 2;
  ball.h = 220;
  ball.vx = 0;
  ball.vh = 0;

  player.x = GOAL_X_LEFT + 180;
  player.h = 0;
  player.vx = 0;
  player.vh = 0;
  player.knockX = 0;
  player.grounded = true;

  opponent.x = GOAL_X_RIGHT - 180;
  opponent.h = 0;
  opponent.vx = 0;
  opponent.vh = 0;
  opponent.knockX = 0;
  opponent.grounded = true;

  kickoffTimer = KICKOFF_FREEZE_SECONDS;
}

/* ---------------------------------------------------------------------
   5. RENDER
   --------------------------------------------------------------------- */
function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawSky();
  drawPitch();
  drawGoal(true);
  drawGoal(false);
  drawEntitiesSorted();

  if (kickoffTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#eafaf0';
    ctx.font = 'bold 36px Segoe UI, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Kickoff!', CANVAS_W / 2, CANVAS_H / 2);
    ctx.textAlign = 'start';
  }
}

function drawSky() {
  const gradient = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  gradient.addColorStop(0, '#173049');
  gradient.addColorStop(1, '#2d5a63');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);
}

function drawPitch() {
  // Grass
  ctx.fillStyle = '#2e7d4f';
  ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H - GROUND_Y);

  // Mowed-stripe texture
  const stripeW = 45;
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  for (let x = 0; x < CANVAS_W; x += stripeW * 2) {
    ctx.fillRect(x, GROUND_Y, stripeW, CANVAS_H - GROUND_Y);
  }

  // Touchline
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(CANVAS_W, GROUND_Y);
  ctx.stroke();

  // Center mark — flattened since we're viewing the ground edge-on
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(CANVAS_W / 2, GROUND_Y, 46, 8, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(CANVAS_W / 2, GROUND_Y, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();
}

// A proper goal frame: back post, front post, crossbar, and a hatched
// net filling the box between them — plain 2D shapes now, no
// projection math needed.
function drawGoal(isLeft) {
  const frontX = isLeft ? GOAL_X_LEFT : GOAL_X_RIGHT;
  const backX = isLeft ? GOAL_X_LEFT - GOAL_NET_DEPTH : GOAL_X_RIGHT + GOAL_NET_DEPTH;
  const leftX = Math.min(frontX, backX);
  const rightX = Math.max(frontX, backX);
  const topY = GROUND_Y - GOAL_HEIGHT;

  // Net hatch
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  const spacing = 11;
  for (let x = leftX; x <= rightX; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x, topY);
    ctx.lineTo(x, GROUND_Y);
    ctx.stroke();
  }
  for (let y = topY; y <= GROUND_Y; y += spacing) {
    ctx.beginPath();
    ctx.moveTo(leftX, y);
    ctx.lineTo(rightX, y);
    ctx.stroke();
  }

  // Frame: back post, front post, crossbar — thick, so it reads clearly
  // as a real goal structure
  ctx.strokeStyle = '#eafaf0';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';

  ctx.beginPath();
  ctx.moveTo(frontX, GROUND_Y);
  ctx.lineTo(frontX, topY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(backX, GROUND_Y);
  ctx.lineTo(backX, topY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(leftX, topY);
  ctx.lineTo(rightX, topY);
  ctx.stroke();

  // Base plate, so the posts look planted rather than floating
  ctx.fillStyle = '#eafaf0';
  ctx.beginPath();
  ctx.ellipse(frontX, GROUND_Y, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(backX, GROUND_Y, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.lineCap = 'butt';
}

function drawEntitiesSorted() {
  // Painter's algorithm: draw whoever is higher in the air LAST so a
  // jumping character correctly overlaps a grounded one they pass over.
  const items = [
    { e: player, kind: 'player' },
    { e: opponent, kind: 'player' },
    { e: ball, kind: 'ball' }
  ].sort((a, b) => a.e.h - b.e.h);

  items.forEach(item => {
    if (item.kind === 'ball') drawBall(item.e);
    else drawCharacter(item.e);
  });
}

// Shadows shrink and fade as their owner gets higher off the ground —
// a simple, readable cue for height that costs almost nothing to draw.
function drawGroundShadow(x, h, baseRadius) {
  const t = clamp(h / 180, 0, 1);
  const rx = baseRadius * (1 - 0.45 * t);
  const ry = baseRadius * 0.32 * (1 - 0.45 * t);
  const alpha = 0.3 * (1 - 0.5 * t);

  ctx.beginPath();
  ctx.ellipse(x, GROUND_Y, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,0,0,${alpha})`;
  ctx.fill();
}

function drawBall(entity) {
  drawGroundShadow(entity.x, entity.h, entity.radius * 1.3);

  const screenY = groundToScreenY(entity.h);
  ctx.beginPath();
  ctx.arc(entity.x, screenY, entity.radius, 0, Math.PI * 2);
  ctx.fillStyle = entity.color;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = entity.dark;
  ctx.stroke();

  // A couple of simple seam lines for a soccer-ball read
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.arc(entity.x, screenY, entity.radius * 0.55, 0.3, Math.PI - 0.3);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(entity.x, screenY, entity.radius * 0.55, Math.PI + 0.3, Math.PI * 2 - 0.3);
  ctx.stroke();
}

/* =======================================================================
   "HEAD SOCCER" STYLE CHARACTER — a big head stacked directly on a
   smaller boot, no body in between. Same shape code as before; the only
   thing that changed is how we get the anchor screen points, which is
   now trivial (no shear/tilt to account for since the camera IS flat).
   ======================================================================= */
function drawCharacter(entity) {
  drawGroundShadow(entity.x, entity.h, entity.radius * 1.3);

  const baseY = groundToScreenY(entity.h);
  const bootY = baseY - BOOT_OFFSET;
  const headY = baseY - HEAD_OFFSET;

  drawBoot(entity.x, bootY, entity);
  drawHead(entity.x, headY, entity);
}

function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBoot(cx, cy, entity) {
  const w = entity.radius * 2.7;
  const h = entity.radius * 1.4;

  ctx.save();
  ctx.translate(cx, cy);

  ctx.fillStyle = '#141414';
  roundRectPath(-w * 0.5, h * 0.22, w, h * 0.24, h * 0.1);
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(0, 0, w * 0.5, h * 0.42, 0, 0, Math.PI * 2);
  ctx.fillStyle = entity.bootColor;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.stroke();

  roundRectPath(-w * 0.16, -h * 0.85, w * 0.32, h * 0.55, w * 0.08);
  ctx.fillStyle = entity.bootColor;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.stroke();

  ctx.strokeStyle = entity.bootAccent;
  ctx.lineWidth = Math.max(2, h * 0.14);
  ctx.beginPath();
  ctx.moveTo(-w * 0.34, -h * 0.02);
  ctx.lineTo(w * 0.34, -h * 0.02);
  ctx.stroke();

  ctx.strokeStyle = '#f4f4f4';
  ctx.lineWidth = 1.5;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(i * w * 0.09 - w * 0.05, -h * 0.55);
    ctx.lineTo(i * w * 0.09 + w * 0.05, -h * 0.22);
    ctx.stroke();
  }

  ctx.restore();
}

function drawHead(cx, cy, entity) {
  const R = entity.radius * 1.9;

  ctx.save();
  ctx.translate(cx, cy);

  roundRectPath(-R * 0.55, R * 0.55, R * 1.1, R * 0.55, R * 0.15);
  ctx.fillStyle = entity.jerseyColor;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.stroke();

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-R * 0.2, R * 0.55);
  ctx.lineTo(0, R * 0.82);
  ctx.lineTo(R * 0.2, R * 0.55);
  ctx.stroke();

  ctx.fillStyle = entity.skin;
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side * R * 0.92, R * 0.05, R * 0.18, R * 0.24, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.stroke();
  });

  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.fillStyle = entity.skin;
  ctx.fill();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.stroke();

  drawHair(entity, R);

  ctx.strokeStyle = entity.browColor;
  ctx.lineWidth = R * 0.14;
  ctx.lineCap = 'round';
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.moveTo(side * R * 0.14, -R * 0.1);
    ctx.lineTo(side * R * 0.5, -R * 0.3);
    ctx.stroke();
  });

  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side * R * 0.35, R * 0.03, R * 0.16, R * 0.12, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(side * R * 0.37, R * 0.04, R * 0.07, 0, Math.PI * 2);
    ctx.fillStyle = entity.eyeColor;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(side * R * 0.37, R * 0.04, R * 0.03, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
  });

  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, R * 0.1);
  ctx.lineTo(-R * 0.05, R * 0.3);
  ctx.lineTo(R * 0.05, R * 0.3);
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(0, R * 0.5, R * 0.26, R * 0.13, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#5c2020';
  ctx.fill();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.stroke();

  ctx.fillStyle = '#fff';
  roundRectPath(-R * 0.2, R * 0.4, R * 0.4, R * 0.09, R * 0.03);
  ctx.fill();

  ctx.restore();
}

function drawHair(entity, R) {
  ctx.fillStyle = entity.hairColor;
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';

  if (entity.hairStyle === 'spiky') {
    ctx.beginPath();
    ctx.moveTo(-R * 0.9, -R * 0.3);
    const spikes = 6;
    for (let i = 0; i <= spikes; i++) {
      const t = i / spikes;
      const x = -R * 0.9 + t * R * 1.8;
      const y = -R * 0.75 - (i % 2 === 0 ? R * 0.25 : R * 0.05);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(R * 0.9, -R * 0.05);
    ctx.quadraticCurveTo(0, -R * 0.5, -R * 0.9, -R * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(-R * 0.85, 0);
    ctx.quadraticCurveTo(-R * 0.9, -R * 0.85, -R * 0.1, -R * 0.85);
    ctx.quadraticCurveTo(R * 0.75, -R * 0.85, R * 0.85, -R * 0.2);
    ctx.quadraticCurveTo(R * 0.5, -R * 0.45, R * 0.1, -R * 0.55);
    ctx.quadraticCurveTo(-R * 0.3, -R * 0.6, -R * 0.6, -R * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

// Kick everything off
requestAnimationFrame(gameLoop);
</script>
