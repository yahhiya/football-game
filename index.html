<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Head Soccer — v6 (arcade match)</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a3326 0%, #0a1810 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #eafaf0;
  }

  h1 {
    margin: 12px 0 8px;
    font-size: 22px;
    letter-spacing: 1px;
  }

  /* Scoreboard */
  #hud {
    display: flex;
    align-items: stretch;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .score-block {
    padding: 8px 22px;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .score-block.blue { background: linear-gradient(160deg, #3fa7ff, #1a4a7a); }
  .score-block.red  { background: linear-gradient(160deg, #ff5b5b, #7a1a1a); }
  .score-num { font-size: 24px; }

  #instructions {
    margin-top: 8px;
    font-size: 13px;
    color: #9fcbb0;
    max-width: 720px;
    text-align: center;
  }

  #arcade-frame {
    padding: 14px;
    background: linear-gradient(155deg, #2b2b2b, #0f0f0f);
    border-radius: 16px;
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.06),
      0 16px 40px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  canvas {
    display: block;
    width: 1000px;
    height: 480px;
    background: #0d2a1c;
    border-radius: 6px;
    box-shadow: inset 0 0 24px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>

<h1>⚽ Head Soccer — v6</h1>
<div id="hud">
  <div class="score-block blue">BLUE <span class="score-num" id="scoreLeft">0</span></div>
  <div class="score-block red">RED <span class="score-num" id="scoreRight">0</span></div>
</div>

<div id="arcade-frame">
  <canvas id="field" width="1000" height="480"></canvas>
</div>

<div id="instructions">
  <strong>Click the field once to give it keyboard focus.</strong>
  A/D or Left/Right to move. W, Up, or Space to jump. J = low kick,
  K = high kick — both swing instantly on press. First to lead when the
  60-second clock runs out wins. Press R to play again after full time.
</div>

<script>
/* =====================================================================
   HEAD SOCCER — V6 (ground-up rebuild: proportions, physics, and a
   real match loop)
   ===================================================================== */

const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');

const CANVAS_W = canvas.width;   // 1000 — wide arcade viewport
const CANVAS_H = canvas.height;  // 480

// ---- Pitch layout: wide, with short goals and lots of open sky so
// there's real room to move and defend ----
const GROUND_Y = 400;
const GOAL_X_LEFT = 70;
const GOAL_X_RIGHT = 930;
const GOAL_HEIGHT = 115;     // short and sleek — nowhere near the top of the screen
const GOAL_NET_DEPTH = 34;
const CEILING_H = GROUND_Y - 20;

function groundToScreenY(h) { return GROUND_Y - h; }
function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
function moveToward(current, target, maxDelta) {
  if (Math.abs(target - current) <= maxDelta) return target;
  return current + Math.sign(target - current) * maxDelta;
}

/* ---------------------------------------------------------------------
   MATCH STATE MACHINE
   gamePhase moves through: pregame -> playing -> (goalPause -> playing)*
   -> ended -> (restart) -> pregame
   Only 'playing' runs full player/AI/collision physics; the others are
   deliberately restricted so a countdown, a goal celebration, or a
   finished match can't be interrupted or skipped by input.
   --------------------------------------------------------------------- */
let gamePhase = 'pregame';
let phaseTimer = 0;
let matchTimeRemaining = 0;
let lastConcedingSide = null; // 'left' | 'right' — who to favor on the next kickoff

const PREGAME_DURATION = 3.6;
const GOAL_PAUSE_DURATION = 1.4;
const MATCH_DURATION = 60;

let scoreLeft = 0;
let scoreRight = 0;

function startPregame() {
  gamePhase = 'pregame';
  phaseTimer = PREGAME_DURATION;
}
startPregame();

/* ---------------------------------------------------------------------
   GAME LOOP
   --------------------------------------------------------------------- */
let lastTime = performance.now();

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 1 / 30);
  lastTime = now;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

/* ---------------------------------------------------------------------
   INPUT
   --------------------------------------------------------------------- */
const keys = {};
const MOVE_KEYS = ['a', 'd', 'arrowleft', 'arrowright', 'w', 'arrowup', ' '];

window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  keys[key] = true;
  if (MOVE_KEYS.includes(key)) e.preventDefault();

  if (gamePhase === 'playing') {
    if (key === 'j') { e.preventDefault(); tryShoot(player, 'low'); }
    if (key === 'k') { e.preventDefault(); tryShoot(player, 'high'); }
  }
  if (key === 'r' && gamePhase === 'ended') {
    e.preventDefault();
    restartMatch();
  }
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

canvas.tabIndex = 0;
canvas.style.outline = 'none';
canvas.addEventListener('click', () => canvas.focus());
window.addEventListener('load', () => canvas.focus());
canvas.focus();

/* ---------------------------------------------------------------------
   ENTITIES — scaled down slightly to fit the wider, more open pitch
   --------------------------------------------------------------------- */
const player = {
  x: GOAL_X_LEFT + 160, h: 0, vx: 0, vh: 0, grounded: true, knockX: 0,
  radius: 12, speed: 280, attackDir: 1,
  shotCooldown: 0, kickTimer: 0, kickType: null, kickApplied: false,
  skin: '#e3a874', hairColor: '#e8b23d', hairStyle: 'spiky', browColor: '#7a5a2a',
  eyeColor: '#3fae5c', jerseyColor: '#3fa7ff', bootColor: '#152233', bootAccent: '#3fa7ff'
};

const opponent = {
  x: GOAL_X_RIGHT - 160, h: 0, vx: 0, vh: 0, grounded: true, knockX: 0,
  radius: 12, speed: 225, attackDir: -1,
  shotCooldown: 0, kickTimer: 0, kickType: null, kickApplied: false,
  skin: '#d99a6c', hairColor: '#241a12', hairStyle: 'side', browColor: '#150f0a',
  eyeColor: '#8a3b3b', jerseyColor: '#ff5b5b', bootColor: '#1a1414', bootAccent: '#ff5b5b'
};

const ball = {
  x: CANVAS_W / 2, h: 200, vx: 0, vh: 0, radius: 12, spin: 0,
};

// ---- Tuning ----
const MOVE_ACCEL = 3600, MOVE_DECEL = 4400;
const GRAVITY_PLAYER_UP = 1500, GRAVITY_PLAYER_DOWN = 2150, JUMP_VELOCITY = 650;

// Ball: high restitution so it NEVER goes dead/flat, with a real speed
// cap and moderate drag so "always bouncy" doesn't also mean "chaotic".
const GRAVITY_BALL = 1300;
const BALL_GROUND_RESTITUTION = 0.8;
const BALL_WALL_RESTITUTION = 0.68;
const BALL_COLLISION_RESTITUTION = 0.78;
const BALL_AIR_DRAG_PER_SECOND = 0.12;
const BALL_GROUND_FRICTION_PER_SECOND = 0.4;
const BALL_SETTLE_THRESHOLD = 6;     // low on purpose — the ball should keep bouncing many times before it's allowed to rest
const BALL_MAX_SPEED = 820;

const HEAD_COLLISION_RADIUS = 23;
const BOOT_COLLISION_RADIUS = 14;
const HEAD_OFFSET = 60;
const BOOT_OFFSET = 6;
const BODY_RADIUS = 16; // closes the head-to-boot gap — see resolveDeepestContact

const KNOCKBACK_FRICTION_PER_SECOND = 0.9;

// Shooting — animation ALWAYS plays on a valid keypress; whether it
// actually connects is decided separately, during the swing's active
// window (see checkKickImpact).
const SHOT_COOLDOWN_SECONDS = 0.5;
const KICK_ANIM_DURATION = 0.26;
const KICK_CONNECT_RANGE = 85;
const AI_KICK_DECISION_RANGE = 95;
const LOW_SHOT_SPEED = 560, LOW_SHOT_LIFT = 70;
const HIGH_SHOT_SPEED = 360, HIGH_SHOT_LIFT = 660;

/* ---------------------------------------------------------------------
   UPDATE
   --------------------------------------------------------------------- */
function update(dt) {
  if (gamePhase === 'pregame') {
    phaseTimer -= dt;
    moveBall(dt); // let it visibly drop in during the countdown
    if (phaseTimer <= 0) {
      gamePhase = 'playing';
      matchTimeRemaining = MATCH_DURATION;
    }
    return;
  }

  if (gamePhase === 'goalPause') {
    phaseTimer -= dt;
    if (phaseTimer <= 0) {
      resetAfterGoal();
      gamePhase = matchTimeRemaining > 0 ? 'playing' : 'ended';
    }
    return;
  }

  if (gamePhase === 'ended') {
    return;
  }

  // gamePhase === 'playing'
  matchTimeRemaining = Math.max(0, matchTimeRemaining - dt);
  if (matchTimeRemaining <= 0) {
    gamePhase = 'ended';
    return;
  }

  movePlayer(dt);
  updateOpponentAI(dt);
  simulateBallSubsteps(dt);

  handleBodyCollision(player, opponent);
  player.x = clamp(player.x, GOAL_X_LEFT + player.radius, GOAL_X_RIGHT - player.radius);
  opponent.x = clamp(opponent.x, GOAL_X_LEFT + opponent.radius, GOAL_X_RIGHT - opponent.radius);
}

/* ---------------------------------------------------------------------
   CONTINUOUS COLLISION (adaptive substepping) — split the ball's motion
   into pieces no bigger than a boot-radius, and re-check every piece,
   so a fast ball can't cross an entire player within one gap between
   checks.
   --------------------------------------------------------------------- */
function simulateBallSubsteps(dt) {
  const speed = Math.hypot(ball.vx, ball.vh);
  const maxStepDistance = Math.max(4, BOOT_COLLISION_RADIUS * 0.8);
  const steps = clamp(Math.ceil((speed * dt) / maxStepDistance), 1, 12);
  const subDt = dt / steps;

  for (let i = 0; i < steps; i++) {
    moveBall(subDt);
    handleEntityBallCollision(player);
    resolveBallWalls();
    handleEntityBallCollision(opponent);
    resolveBallWalls();
    checkKickImpact(player);
    checkKickImpact(opponent);
    if (handleGoals()) return;
  }
}

function movePlayer(dt) {
  updateShotTimers(player, dt);

  let dir = 0;
  if (keys['a'] || keys['arrowleft']) dir -= 1;
  if (keys['d'] || keys['arrowright']) dir += 1;

  const targetVx = dir * player.speed;
  const accel = dir !== 0 ? MOVE_ACCEL : MOVE_DECEL;
  player.vx = moveToward(player.vx, targetVx, accel * dt);
  player.x += player.vx * dt;

  if ((keys['w'] || keys['arrowup'] || keys[' ']) && player.grounded) {
    player.vh = JUMP_VELOCITY;
    player.grounded = false;
  }

  applyGravity(player, dt);
  applyKnockback(player, dt);
  player.x = clamp(player.x, GOAL_X_LEFT + player.radius, GOAL_X_RIGHT - player.radius);
}

function updateOpponentAI(dt) {
  updateShotTimers(opponent, dt);

  const toBallX = ball.x - opponent.x;
  let desiredDir = 0;
  if (Math.abs(toBallX) > 4) desiredDir = Math.sign(toBallX);

  const awayX = opponent.x - player.x;
  const distPlayer = Math.abs(awayX);
  const SEPARATION_RANGE = opponent.radius + player.radius + 34;
  let sepDir = 0;
  if (distPlayer > 0 && distPlayer < SEPARATION_RANGE) {
    sepDir = Math.sign(awayX) * (1 - distPlayer / SEPARATION_RANGE);
  }

  const steer = clamp(desiredDir + sepDir * 1.3, -1, 1);
  const targetVx = steer * opponent.speed;
  const accel = Math.abs(steer) > 0.05 ? MOVE_ACCEL : MOVE_DECEL;
  opponent.vx = moveToward(opponent.vx, targetVx, accel * dt);
  opponent.x += opponent.vx * dt;

  const ballIsClose = Math.abs(ball.x - opponent.x) < 70;
  const ballIsUp = ball.h > 50;
  if (ballIsClose && ballIsUp && opponent.grounded) {
    opponent.vh = JUMP_VELOCITY;
    opponent.grounded = false;
  }

  const decisionDist = Math.hypot(ball.x - opponent.x, ball.h - (opponent.h + BOOT_OFFSET));
  if (decisionDist < AI_KICK_DECISION_RANGE) {
    const shotType = ball.h < 55 ? 'low' : (Math.random() < 0.55 ? 'low' : 'high');
    tryShoot(opponent, shotType);
  }

  applyGravity(opponent, dt);
  applyKnockback(opponent, dt);
  opponent.x = clamp(opponent.x, GOAL_X_LEFT + opponent.radius, GOAL_X_RIGHT - opponent.radius);
}

function applyGravity(entity, dt) {
  const g = entity.vh > 0 ? GRAVITY_PLAYER_UP : GRAVITY_PLAYER_DOWN;
  entity.vh -= g * dt;
  entity.h += entity.vh * dt;
  if (entity.h <= 0) { entity.h = 0; entity.vh = 0; entity.grounded = true; }
  else { entity.grounded = false; }
}

function applyKnockback(entity, dt) {
  const decay = Math.pow(1 - KNOCKBACK_FRICTION_PER_SECOND, dt);
  entity.knockX *= decay;
  if (Math.abs(entity.knockX) < 2) entity.knockX = 0;
  entity.x += entity.knockX * dt;
}

function moveBall(dt) {
  ball.vh -= GRAVITY_BALL * dt;

  if (ball.h > 0) {
    ball.vx *= Math.pow(1 - BALL_AIR_DRAG_PER_SECOND, dt);
  } else {
    ball.vx *= Math.pow(1 - BALL_GROUND_FRICTION_PER_SECOND, dt);
    if (Math.abs(ball.vx) < 2) ball.vx = 0;
  }

  ball.x += ball.vx * dt;
  ball.h += ball.vh * dt;
  ball.spin += (ball.vx / ball.radius) * dt; // rolling spin, purely cosmetic

  resolveBallWalls();
}

function resolveBallWalls() {
  if (ball.h < 0) {
    ball.h = 0;
    if (ball.vh < 0) ball.vh = -ball.vh * BALL_GROUND_RESTITUTION;
    if (Math.abs(ball.vh) < BALL_SETTLE_THRESHOLD) ball.vh = 0;
  }
  if (ball.h > CEILING_H) {
    ball.h = CEILING_H;
    if (ball.vh > 0) ball.vh = -Math.abs(ball.vh) * 0.5;
  }

  const inGoalOpening = ball.h < GOAL_HEIGHT;
  if (!inGoalOpening) {
    if (ball.x - ball.radius < GOAL_X_LEFT) {
      ball.x = GOAL_X_LEFT + ball.radius;
      ball.vx = Math.abs(ball.vx) * BALL_WALL_RESTITUTION;
    }
    if (ball.x + ball.radius > GOAL_X_RIGHT) {
      ball.x = GOAL_X_RIGHT - ball.radius;
      ball.vx = -Math.abs(ball.vx) * BALL_WALL_RESTITUTION;
    }
  }

  const speed = Math.hypot(ball.vx, ball.vh);
  if (speed > BALL_MAX_SPEED) {
    const scale = BALL_MAX_SPEED / speed;
    ball.vx *= scale;
    ball.vh *= scale;
  }
}

/* ---------------------------------------------------------------------
   ENTITY HITBOX — head circle + boot circle + a capsule spanning the
   torso between them, so there's no gap for the ball to slip through.
   The boot candidate additionally gets a "toe slope" bias: near-
   horizontal contacts get nudged upward, so a ball squeezed between
   two players pops up and out instead of getting trapped oscillating
   sideways forever.
   --------------------------------------------------------------------- */
function pointOverlap(cx, cH, cR, kickPower, toeSlope) {
  const dx = ball.x - cx;
  const dh = ball.h - cH;
  const dist = Math.hypot(dx, dh);
  const minDist = cR + ball.radius;
  const trueNx = dist > 0 ? dx / dist : 0;
  const trueNh = dist > 0 ? dh / dist : 1;

  // The TRUE normal always resolves position (guarantees the ball
  // actually clears this shape's real boundary). The RESPONSE normal is
  // what the bounce direction uses, and can be biased (toe slope)
  // without ever leaving the ball still overlapping — those two jobs
  // are now kept deliberately separate.
  let responseNx = trueNx, responseNh = trueNh;
  if (toeSlope && dist > 0) {
    const UPWARD_BIAS = 0.6;
    responseNh = trueNh + UPWARD_BIAS * (1 - Math.abs(trueNh));
    const len = Math.hypot(responseNx, responseNh);
    responseNx /= len; responseNh /= len;
  }

  return { dist, penetration: minDist - dist, nx: trueNx, nh: trueNh, responseNx, responseNh, kickPower };
}

function capsuleOverlap(cx, bottomH, topH, cR, kickPower) {
  const clampedH = clamp(ball.h, bottomH, topH);
  return pointOverlap(cx, clampedH, cR, kickPower, false);
}

function resolveDeepestContact(entity) {
  // The capsule spans only the actual former gap (from the boot's own
  // top edge to the head's own bottom edge) rather than the full
  // boot-to-head centerline. If it overlapped the boot's own zone, its
  // larger radius would out-compete the boot's toe-slope-biased contact
  // on every deepest-penetration comparison, silently cancelling the
  // pop-up behavior near the ground — which is exactly where it matters most.
  const bootTopEdge = entity.h + BOOT_OFFSET + BOOT_COLLISION_RADIUS;
  const headBottomEdge = entity.h + HEAD_OFFSET - HEAD_COLLISION_RADIUS;

  const candidates = [
    pointOverlap(entity.x, entity.h + HEAD_OFFSET, HEAD_COLLISION_RADIUS, 1.1, false),
    pointOverlap(entity.x, entity.h + BOOT_OFFSET, BOOT_COLLISION_RADIUS, 1.3, true),
    capsuleOverlap(entity.x, bootTopEdge, headBottomEdge, BODY_RADIUS, 1.15)
  ];

  let best = null;
  for (const c of candidates) {
    if (c.penetration > 0 && c.dist > 0 && (!best || c.penetration > best.penetration)) best = c;
  }
  if (!best) return false;

  ball.x += best.nx * best.penetration;
  ball.h += best.nh * best.penetration;

  const dot = ball.vx * best.responseNx + ball.vh * best.responseNh;
  const reflectedVx = ball.vx - 2 * dot * best.responseNx;
  const reflectedVh = ball.vh - 2 * dot * best.responseNh;
  const entitySpeed = Math.hypot(entity.vx, entity.vh);

  ball.vx = reflectedVx * BALL_COLLISION_RESTITUTION + best.responseNx * entitySpeed * best.kickPower + entity.vx * 0.35;
  ball.vh = reflectedVh * BALL_COLLISION_RESTITUTION + best.responseNh * entitySpeed * best.kickPower + entity.vh * 0.35;
  return true;
}

function handleEntityBallCollision(entity) {
  let hitAny = false;
  for (let pass = 0; pass < 2; pass++) {
    if (resolveDeepestContact(entity)) hitAny = true;
    else break;
  }
  return hitAny;
}

/* ---------------------------------------------------------------------
   SHOOTING — the animation always plays on a valid press (gated only by
   cooldown, never by ball position). Whether the ball actually gets hit
   is decided separately by checkKickImpact, during the active middle
   portion of that same swing — so the hitbox window matches what you
   see on screen.
   --------------------------------------------------------------------- */
function tryShoot(entity, type) {
  if (entity.shotCooldown > 0) return false;
  entity.shotCooldown = SHOT_COOLDOWN_SECONDS;
  entity.kickTimer = KICK_ANIM_DURATION;
  entity.kickType = type;
  entity.kickApplied = false;
  return true;
}

function checkKickImpact(entity) {
  if (entity.kickTimer <= 0 || !entity.kickType || entity.kickApplied) return;

  const progress = 1 - entity.kickTimer / KICK_ANIM_DURATION;
  const inActiveWindow = progress > 0.25 && progress < 0.75;
  if (!inActiveWindow) return;

  const dist = Math.hypot(ball.x - entity.x, ball.h - (entity.h + BOOT_OFFSET));
  if (dist > KICK_CONNECT_RANGE) return;

  const speed = entity.kickType === 'low' ? LOW_SHOT_SPEED : HIGH_SHOT_SPEED;
  const lift = entity.kickType === 'low' ? LOW_SHOT_LIFT : HIGH_SHOT_LIFT;

  ball.vx = entity.attackDir * speed + entity.vx * 0.25;
  ball.vh = lift + entity.vh * 0.25;
  entity.kickApplied = true;
}

function updateShotTimers(entity, dt) {
  entity.shotCooldown = Math.max(0, entity.shotCooldown - dt);
  entity.kickTimer = Math.max(0, entity.kickTimer - dt);
}

function handleBodyCollision(a, b) {
  const dx = b.x - a.x;
  const distX = Math.abs(dx);
  const minDist = a.radius * 2 + b.radius * 2;
  const heightDiff = Math.abs(a.h - b.h);

  if (distX < minDist && distX > 0 && heightDiff < HEAD_COLLISION_RADIUS * 1.5) {
    const overlap = (minDist - distX) / 2;
    const dir = Math.sign(dx);
    a.x -= dir * overlap;
    b.x += dir * overlap;

    const KNOCK_STRENGTH = 0.5;
    b.knockX += dir * Math.abs(a.vx) * KNOCK_STRENGTH;
    a.knockX -= dir * Math.abs(b.vx) * KNOCK_STRENGTH;
  }
}

function handleGoals() {
  if (ball.x + ball.radius < GOAL_X_LEFT) {
    scoreRight++;
    document.getElementById('scoreRight').textContent = scoreRight;
    startGoalPause('left');
    return true;
  }
  if (ball.x - ball.radius > GOAL_X_RIGHT) {
    scoreLeft++;
    document.getElementById('scoreLeft').textContent = scoreLeft;
    startGoalPause('right');
    return true;
  }
  return false;
}

function startGoalPause(concedingSide) {
  gamePhase = 'goalPause';
  phaseTimer = GOAL_PAUSE_DURATION;
  lastConcedingSide = concedingSide;
}

// Concession kickoff: the ball drops closer to whoever just conceded,
// giving them a fair first chance to clear it instead of a neutral
// 50/50 restart every single time.
function resetAfterGoal() {
  const centerX = CANVAS_W / 2;
  const bias = (GOAL_X_RIGHT - GOAL_X_LEFT) * 0.15;
  let ballX = centerX;
  if (lastConcedingSide === 'left') ballX = centerX - bias;
  else if (lastConcedingSide === 'right') ballX = centerX + bias;

  ball.x = ballX; ball.h = 200; ball.vx = 0; ball.vh = 0; ball.spin = 0;

  player.x = GOAL_X_LEFT + 160; player.h = 0; player.vx = 0; player.vh = 0;
  player.knockX = 0; player.grounded = true; player.shotCooldown = 0;
  player.kickTimer = 0; player.kickApplied = false;

  opponent.x = GOAL_X_RIGHT - 160; opponent.h = 0; opponent.vx = 0; opponent.vh = 0;
  opponent.knockX = 0; opponent.grounded = true; opponent.shotCooldown = 0;
  opponent.kickTimer = 0; opponent.kickApplied = false;
}

function restartMatch() {
  scoreLeft = 0; scoreRight = 0;
  document.getElementById('scoreLeft').textContent = '0';
  document.getElementById('scoreRight').textContent = '0';
  lastConcedingSide = null;
  resetAfterGoal();
  startPregame();
}

/* ---------------------------------------------------------------------
   RENDER
   --------------------------------------------------------------------- */
function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawSky();
  drawPitch();
  drawGoal(true);
  drawGoal(false);
  drawEntitiesSorted();
  drawTimerBadge();

  if (gamePhase === 'pregame') drawPregameOverlay();
  if (gamePhase === 'goalPause') drawGoalBanner();
  if (gamePhase === 'ended') drawEndedOverlay();
}

function drawSky() {
  const gradient = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  gradient.addColorStop(0, '#0b1622');
  gradient.addColorStop(0.6, '#132a3a');
  gradient.addColorStop(1, '#1f4550');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);

  [CANVAS_W * 0.15, CANVAS_W * 0.5, CANVAS_W * 0.85].forEach(lx => {
    const glow = ctx.createRadialGradient(lx, 20, 4, lx, 20, 130);
    glow.addColorStop(0, 'rgba(255,255,230,0.22)');
    glow.addColorStop(1, 'rgba(255,255,230,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(lx, 20, 130, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawPitch() {
  ctx.fillStyle = '#2e7d4f';
  ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H - GROUND_Y);

  const stripeW = 54;
  for (let x = 0, i = 0; x < CANVAS_W; x += stripeW, i++) {
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';
    ctx.fillRect(x, GROUND_Y, stripeW, CANVAS_H - GROUND_Y);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(CANVAS_W, GROUND_Y);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(CANVAS_W / 2, GROUND_Y, 42, 7, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(CANVAS_W / 2, GROUND_Y, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();
}

function drawGoal(isLeft) {
  const frontX = isLeft ? GOAL_X_LEFT : GOAL_X_RIGHT;
  const backX = isLeft ? GOAL_X_LEFT - GOAL_NET_DEPTH : GOAL_X_RIGHT + GOAL_NET_DEPTH;
  const leftX = Math.min(frontX, backX);
  const rightX = Math.max(frontX, backX);
  const topY = GROUND_Y - GOAL_HEIGHT;

  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  const spacing = 9;
  for (let x = leftX; x <= rightX; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, topY); ctx.lineTo(x, GROUND_Y); ctx.stroke();
  }
  for (let y = topY; y <= GROUND_Y; y += spacing) {
    ctx.beginPath(); ctx.moveTo(leftX, y); ctx.lineTo(rightX, y); ctx.stroke();
  }

  ctx.strokeStyle = '#eafaf0';
  ctx.lineWidth = 4.5;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(frontX, GROUND_Y); ctx.lineTo(frontX, topY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(backX, GROUND_Y); ctx.lineTo(backX, topY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(leftX, topY); ctx.lineTo(rightX, topY); ctx.stroke();

  ctx.fillStyle = '#eafaf0';
  ctx.beginPath(); ctx.ellipse(frontX, GROUND_Y, 6, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(backX, GROUND_Y, 6, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.lineCap = 'butt';
}

function drawTimerBadge() {
  if (gamePhase === 'pregame') return;
  const secs = Math.ceil(matchTimeRemaining);
  const urgent = secs <= 10 && gamePhase === 'playing';

  const bw = 84, bh = 38, bx = CANVAS_W / 2 - bw / 2, by = 12;
  roundRectPath(bx, by, bw, bh, 9);
  ctx.fillStyle = urgent ? 'rgba(150,20,20,0.88)' : 'rgba(0,0,0,0.55)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 21px Segoe UI, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(secs), CANVAS_W / 2, by + bh / 2 + 1);
  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}

function drawPregameOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  const text = phaseTimer > 2.6 ? '3' : phaseTimer > 1.6 ? '2' : phaseTimer > 0.6 ? '1' : 'GO!';
  ctx.fillStyle = '#eafaf0';
  ctx.font = 'bold 72px Segoe UI, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, CANVAS_W / 2, CANVAS_H / 2);
  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}

function drawGoalBanner() {
  const elapsed = GOAL_PAUSE_DURATION - phaseTimer;
  const scale = elapsed < 0.15 ? elapsed / 0.15 : 1;
  const alpha = elapsed > GOAL_PAUSE_DURATION - 0.3 ? clamp((GOAL_PAUSE_DURATION - elapsed) / 0.3, 0, 1) : 1;

  ctx.fillStyle = `rgba(0,0,0,${0.4 * alpha})`;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.save();
  ctx.translate(CANVAS_W / 2, CANVAS_H / 2);
  ctx.scale(Math.max(scale, 0.01), Math.max(scale, 0.01));
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 80px Segoe UI, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#8a2b0a';
  ctx.strokeText('GOAL!', 0, 0);
  ctx.fillStyle = '#ffd23f';
  ctx.fillText('GOAL!', 0, 0);
  ctx.restore();

  ctx.globalAlpha = 1;
  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}

function drawEndedOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#eafaf0';
  ctx.font = 'bold 42px Segoe UI, Arial, sans-serif';
  ctx.fillText("Time's Up!", CANVAS_W / 2, CANVAS_H / 2 - 30);

  const result = scoreLeft > scoreRight ? 'You Win!' : scoreLeft < scoreRight ? 'AI Wins' : 'Draw!';
  ctx.font = 'bold 24px Segoe UI, Arial, sans-serif';
  ctx.fillText(result, CANVAS_W / 2, CANVAS_H / 2 + 14);

  ctx.font = '15px Segoe UI, Arial, sans-serif';
  ctx.fillStyle = '#9fcbb0';
  ctx.fillText('Press R to play again', CANVAS_W / 2, CANVAS_H / 2 + 48);

  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}

function drawEntitiesSorted() {
  const items = [
    { e: player, kind: 'player' },
    { e: opponent, kind: 'player' },
    { e: ball, kind: 'ball' }
  ].sort((a, b) => a.e.h - b.e.h);

  items.forEach(item => {
    if (item.kind === 'ball') drawBall(item.e);
    else drawCharacter(item.e);
  });
}

function drawGroundShadow(x, h, baseRadius) {
  const t = clamp(h / 160, 0, 1);
  const rx = baseRadius * (1 - 0.45 * t);
  const ry = baseRadius * 0.32 * (1 - 0.45 * t);
  const alpha = 0.3 * (1 - 0.5 * t);
  ctx.beginPath();
  ctx.ellipse(x, GROUND_Y, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,0,0,${alpha})`;
  ctx.fill();
}

/* -----------------------------------------------------------------------
   BALL — a real football pattern (pentagon tiling) that spins with its
   rolling motion, instead of a flat tan circle.
   ----------------------------------------------------------------------- */
function regularPolygonPath(cx, cy, r, sides, rotation) {
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const a = rotation + i * (2 * Math.PI / sides) - Math.PI / 2;
    const px = cx + Math.cos(a) * r, py = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function drawSoccerPattern(radius) {
  ctx.fillStyle = '#1c1c1c';
  regularPolygonPath(0, 0, radius * 0.36, 5, 0);
  ctx.fill();
  for (let i = 0; i < 5; i++) {
    const angle = i * (2 * Math.PI / 5);
    const cx = Math.cos(angle - Math.PI / 2) * radius * 0.72;
    const cy = Math.sin(angle - Math.PI / 2) * radius * 0.72;
    regularPolygonPath(cx, cy, radius * 0.24, 5, angle);
    ctx.fill();
  }
}

function drawBall(entity) {
  drawGroundShadow(entity.x, entity.h, entity.radius * 1.3);
  const screenY = groundToScreenY(entity.h);

  ctx.save();
  ctx.translate(entity.x, screenY);

  const base = ctx.createRadialGradient(-entity.radius * 0.3, -entity.radius * 0.3, entity.radius * 0.1, 0, 0, entity.radius);
  base.addColorStop(0, '#ffffff');
  base.addColorStop(1, '#e2dcce');
  ctx.beginPath();
  ctx.arc(0, 0, entity.radius, 0, Math.PI * 2);
  ctx.fillStyle = base;
  ctx.fill();

  ctx.save();
  ctx.beginPath();
  ctx.arc(0, 0, entity.radius, 0, Math.PI * 2);
  ctx.clip();
  ctx.rotate(entity.spin);
  drawSoccerPattern(entity.radius);
  ctx.restore();

  ctx.lineWidth = 1.4;
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.arc(0, 0, entity.radius, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

function drawCharacter(entity) {
  drawGroundShadow(entity.x, entity.h, entity.radius * 1.3);

  const baseY = groundToScreenY(entity.h);
  const bootY = baseY - BOOT_OFFSET;
  const headY = baseY - HEAD_OFFSET;

  drawBoot(entity.x, bootY, entity);
  drawTorso(entity.x, bootY, headY, entity);
  drawHead(entity.x, headY, entity);
}

function drawTorso(cx, bootScreenY, headScreenY, entity) {
  const width = BODY_RADIUS * 1.7;
  const top = headScreenY + entity.radius * 0.9;
  const bottom = bootScreenY - entity.radius * 0.15;

  roundRectPath(cx - width / 2, top, width, bottom - top, width * 0.3);
  ctx.fillStyle = entity.jerseyColor;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.stroke();
}

function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBoot(cx, cy, entity) {
  const w = entity.radius * 3.1;
  const h = entity.radius * 1.9;

  let swingAngle = 0;
  if (entity.kickTimer > 0 && entity.kickType) {
    const progress = 1 - entity.kickTimer / KICK_ANIM_DURATION;
    const swing = Math.sin(progress * Math.PI);
    const maxAngle = entity.kickType === 'low' ? 0.8 : 1.15;
    swingAngle = -maxAngle * swing;
  }

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(entity.attackDir, 1);
  ctx.rotate(swingAngle);

  const heelX = -w * 0.42, toeX = w * 0.52;
  const soleY = h * 0.3, cuffTopY = -h * 0.62;

  ctx.beginPath();
  ctx.moveTo(heelX + w * 0.08, cuffTopY);
  ctx.quadraticCurveTo(-w * 0.02, cuffTopY - h * 0.08, w * 0.04, cuffTopY + h * 0.05);
  ctx.quadraticCurveTo(w * 0.34, -h * 0.28, toeX, h * 0.02);
  ctx.quadraticCurveTo(w * 0.5, h * 0.22, toeX - w * 0.14, soleY);
  ctx.lineTo(heelX + w * 0.06, soleY);
  ctx.quadraticCurveTo(heelX - w * 0.04, soleY - h * 0.05, heelX, h * 0.02);
  ctx.quadraticCurveTo(heelX - w * 0.03, cuffTopY + h * 0.25, heelX + w * 0.08, cuffTopY);
  ctx.closePath();

  ctx.fillStyle = entity.bootColor;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.stroke();

  ctx.fillStyle = '#0a0a0a';
  const studCount = 4;
  for (let i = 0; i < studCount; i++) {
    const t = i / (studCount - 1);
    const sx = heelX + w * 0.1 + t * (toeX - w * 0.2 - heelX);
    ctx.beginPath();
    ctx.ellipse(sx, soleY + h * 0.06, w * 0.035, h * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.strokeStyle = entity.bootAccent;
  ctx.lineWidth = Math.max(2, h * 0.1);
  ctx.beginPath();
  ctx.moveTo(heelX + w * 0.12, -h * 0.02);
  ctx.lineTo(toeX - w * 0.22, -h * 0.05);
  ctx.stroke();

  ctx.strokeStyle = '#f4f4f4';
  ctx.lineWidth = 1.4;
  for (let i = 0; i < 3; i++) {
    const lx = w * 0.06 + i * w * 0.09;
    ctx.beginPath();
    ctx.moveTo(lx, cuffTopY + h * 0.18);
    ctx.lineTo(lx + w * 0.07, cuffTopY + h * 0.36);
    ctx.stroke();
  }

  ctx.restore();
}

function drawHead(cx, cy, entity) {
  const R = entity.radius * 2.0;

  ctx.save();
  ctx.translate(cx, cy);

  roundRectPath(-R * 0.55, R * 0.55, R * 1.1, R * 0.55, R * 0.15);
  ctx.fillStyle = entity.jerseyColor;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.stroke();

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-R * 0.2, R * 0.55);
  ctx.lineTo(0, R * 0.82);
  ctx.lineTo(R * 0.2, R * 0.55);
  ctx.stroke();

  ctx.fillStyle = entity.skin;
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side * R * 0.92, R * 0.05, R * 0.18, R * 0.24, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.stroke();
  });

  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.fillStyle = entity.skin;
  ctx.fill();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.stroke();

  drawHair(entity, R);

  ctx.strokeStyle = entity.browColor;
  ctx.lineWidth = R * 0.14;
  ctx.lineCap = 'round';
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.moveTo(side * R * 0.14, -R * 0.1);
    ctx.lineTo(side * R * 0.5, -R * 0.3);
    ctx.stroke();
  });

  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side * R * 0.35, R * 0.03, R * 0.16, R * 0.12, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(side * R * 0.37, R * 0.04, R * 0.07, 0, Math.PI * 2);
    ctx.fillStyle = entity.eyeColor;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(side * R * 0.37, R * 0.04, R * 0.03, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
  });

  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, R * 0.1);
  ctx.lineTo(-R * 0.05, R * 0.3);
  ctx.lineTo(R * 0.05, R * 0.3);
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(0, R * 0.5, R * 0.26, R * 0.13, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#5c2020';
  ctx.fill();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.stroke();

  ctx.fillStyle = '#fff';
  roundRectPath(-R * 0.2, R * 0.4, R * 0.4, R * 0.09, R * 0.03);
  ctx.fill();

  ctx.restore();
}

function drawHair(entity, R) {
  ctx.fillStyle = entity.hairColor;
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';

  if (entity.hairStyle === 'spiky') {
    ctx.beginPath();
    ctx.moveTo(-R * 0.9, -R * 0.3);
    const spikes = 6;
    for (let i = 0; i <= spikes; i++) {
      const t = i / spikes;
      const x = -R * 0.9 + t * R * 1.8;
      const y = -R * 0.75 - (i % 2 === 0 ? R * 0.25 : R * 0.05);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(R * 0.9, -R * 0.05);
    ctx.quadraticCurveTo(0, -R * 0.5, -R * 0.9, -R * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(-R * 0.85, 0);
    ctx.quadraticCurveTo(-R * 0.9, -R * 0.85, -R * 0.1, -R * 0.85);
    ctx.quadraticCurveTo(R * 0.75, -R * 0.85, R * 0.85, -R * 0.2);
    ctx.quadraticCurveTo(R * 0.5, -R * 0.45, R * 0.1, -R * 0.55);
    ctx.quadraticCurveTo(-R * 0.3, -R * 0.6, -R * 0.6, -R * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

// Kick everything off
requestAnimationFrame(gameLoop);
</script>
</body>
